// Uppföljare till Slemkungens Grotta. En enhet är värd (stor skärm), mobiler ansluter
// som handkontroller via PeerJS. All grafik ritas proceduralt, all musik är original.
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const VW = 960, VH = 540;

function fitCanvas(){
  const s = Math.min(window.innerWidth/VW, window.innerHeight/VH);
  cv.style.width = Math.floor(VW*s)+'px';
  cv.style.height = Math.floor(VH*s)+'px';
}
window.addEventListener('resize', fitCanvas); fitCanvas();
cv.focus();
cv.addEventListener('pointerdown', ()=>{ cv.focus(); initAudio(); });

const dist = (ax,ay,bx,by)=>Math.hypot(bx-ax, by-ay);
const clamp = (v,a,b)=>v<a?a:(v>b?b:v);
const lerp = (a,b,t)=>a+(b-a)*t;
const rnd = (a,b)=>a+Math.random()*(b-a);
const pick = arr=>arr[(Math.random()*arr.length)|0];

<script>
'use strict';
// ===================== LJUD =====================
let actx = null, sfxGain = null, musGain = null, musicOn = true, noiseBuf = null;
function initAudio(){
  if(actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    sfxGain = actx.createGain(); sfxGain.gain.value = 0.5; sfxGain.connect(actx.destination);
    musGain = actx.createGain(); musGain.gain.value = 0.3; musGain.connect(actx.destination);
    noiseBuf = actx.createBuffer(1, actx.sampleRate*0.1, actx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
    MUS.next = actx.currentTime + 0.1;
  }catch(e){}
}
const freq = n=>440*Math.pow(2,(n-69)/12);
function tone(f0,f1,dur,type,vol,when){
  if(!actx) return;
  const t = when!==undefined?when:actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(Math.max(f0,1),t);
  if(f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+dur+0.02);
}
function noiseSfx(dur,vol,hp){
  if(!actx) return;
  const n = actx.sampleRate*dur, buf = actx.createBuffer(1,n,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*(1-i/n);
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain(); g.gain.value = vol;
  if(hp){ const f = actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; src.connect(f); f.connect(g); }
  else src.connect(g);
  g.connect(sfxGain); src.start();
}
function sfx(name){
  if(!actx) return;
  const t = actx.currentTime;
  switch(name){
    case 'swing': noiseSfx(0.08,0.22,2000); break;
    case 'hit': tone(200,70,0.08,'square',0.26); noiseSfx(0.05,0.12,1200); break;
    case 'hit2': tone(160,50,0.12,'square',0.3); noiseSfx(0.08,0.16,800); break;
    case 'kick': tone(260,90,0.1,'square',0.26); noiseSfx(0.07,0.14,1000); break;
    case 'jump': tone(200,420,0.12,'square',0.14); break;
    case 'land': noiseSfx(0.06,0.12,400); break;
    case 'spin': noiseSfx(0.25,0.26,1200); tone(500,240,0.24,'square',0.16); break;
    case 'slam': tone(120,35,0.3,'sawtooth',0.4); noiseSfx(0.25,0.3,120); break;
    case 'dash': noiseSfx(0.14,0.24,2400); tone(800,200,0.14,'sawtooth',0.12); break;
    case 'rocket': tone(140,700,0.3,'sawtooth',0.24); noiseSfx(0.25,0.2,900); break;
    case 'star': tone(1100,700,0.09,'square',0.15); break;

    case 'laser': tone(1600,300,0.2,'sawtooth',0.2); break;

    case 'ready': tone(523,784,0.14,'square',0.2); break;
    case 'special': tone(300,900,0.2,'square',0.2); noiseSfx(0.15,0.14,1600); break;
    case 'nospecial': tone(220,160,0.12,'square',0.14); break;

    case 'thunder': tone(70,25,0.6,'sawtooth',0.4); noiseSfx(0.5,0.26,80); break;
    case 'fire': tone(180,50,0.25,'sawtooth',0.26); noiseSfx(0.2,0.18,400); break;
  }
}

// All musik är egna originalkompositioner — stämning inspirerad av klassiska
// NES/SNES-actionspel, men inga riktiga spelmelodier (de är upphovsrättsskyddade).
function N(tok){
  const m = tok.match(/^([A-G])([#b]?)(-?\d)$/); if(!m) return 0;
  const base = {C:0,D:2,E:4,F:5,G:7,A:9,B:11}[m[1]];
  return base + (m[2]==='#'?1:m[2]==='b'?-1:0) + (parseInt(m[3],10)+1)*12;
}
function parseSeq(s){
  const toks = s.trim().split(/\s+/);
  const out = new Array(toks.length).fill(null);
  for(let i=0;i<toks.length;i++){
    const tk = toks[i];
    if(tk==='.'||tk==='-') continue;
    let d = 1; for(let j=i+1;j<toks.length && toks[j]==='-';j++) d++;
    out[i] = {m:N(tk), d};
  }
  return out;
}
function mkSong(sd, lead, harm, bass, drums, vols, opts){
  return { sd, len:64, echo:!!(opts&&opts.echo), vib:!(opts&&opts.vib===false),
    tracks: [
      {notes:parseSeq(lead), wave:'square',   vol:(vols&&vols[0])||0.082},
      {notes:parseSeq(harm), wave:'square',   vol:(vols&&vols[1])||0.05},
      {notes:parseSeq(bass), wave:'triangle', vol:(vols&&vols[2])||0.17}
    ],
    drums: drums.replace(/\s/g,'') };
}
// en not med valfritt vibrato (LFO på frekvensen — klassiskt NES-lead)
function musNote(wave, midi, t, dur, vol, vib){
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = wave; o.frequency.value = freq(midi);
  g.gain.setValueAtTime(vol, t);
  g.gain.setValueAtTime(vol, t + Math.max(0.01, dur - 0.04));
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(musGain);
  if(vib && dur > 0.16){
    const lfo = actx.createOscillator(), lg = actx.createGain();
    lfo.type = 'sine'; lfo.frequency.value = 5.6;
    lg.gain.value = freq(midi)*0.007;
    lfo.connect(lg); lg.connect(o.frequency);
    lfo.start(t+0.07); lfo.stop(t + dur + 0.02);
  }
  o.start(t); o.stop(t + dur + 0.02);
}

const MUS = { key:'', song:null, step:0, next:0 };
function setSong(key){
  if(MUS.key===key) return;
  MUS.key = key; MUS.song = SONGS[key]||null; MUS.step = 0;
  if(actx) MUS.next = actx.currentTime + 0.08;
}
function drumHit(ch, t){
  if(!noiseBuf) return;
  const hat = ()=>{ const s=actx.createBufferSource(); s.buffer=noiseBuf;
    const g=actx.createGain(), f=actx.createBiquadFilter();
    f.type='highpass'; f.frequency.value=6500;
    g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
    s.connect(f); f.connect(g); g.connect(musGain); s.start(t); s.stop(t+0.04); };
  const kick = ()=>{ const o=actx.createOscillator(), g=actx.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(100,t);
    o.frequency.exponentialRampToValueAtTime(40,t+0.09);
    g.gain.setValueAtTime(0.32,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g); g.connect(musGain); o.start(t); o.stop(t+0.11); };
  const snare = ()=>{ const s=actx.createBufferSource(); s.buffer=noiseBuf;
    const g=actx.createGain(), f=actx.createBiquadFilter();
    f.type='highpass'; f.frequency.value=1700;
    g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
    s.connect(f); f.connect(g); g.connect(musGain); s.start(t); s.stop(t+0.1); };
  const crash = ()=>{ const s=actx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
    const g=actx.createGain(), f=actx.createBiquadFilter();
    f.type='highpass'; f.frequency.value=4500;
    g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    s.connect(f); f.connect(g); g.connect(musGain); s.start(t); s.stop(t+0.5); };
  if(ch==='k') kick();
  else if(ch==='K'){ kick(); hat(); }
  else if(ch==='s') snare();
  else if(ch==='S'){ snare(); hat(); }
  else if(ch==='h') hat();
  else if(ch==='o'){ crash(); kick(); }
}
function updMusic(){
  if(!actx || !musicOn || !MUS.song) return;
  if(MUS.next < actx.currentTime - 0.15) MUS.next = actx.currentTime + 0.05;
  const sg = MUS.song;
  while(MUS.next < actx.currentTime + 0.35){
    const i = MUS.step % sg.len, t = MUS.next;
    for(let ti=0; ti<sg.tracks.length; ti++){
      const tr = sg.tracks[ti];
      const nt = tr.notes[i];
      if(nt && nt.m>12){
        const dur = nt.d * sg.sd;
        musNote(tr.wave, nt.m, t, dur, tr.vol, ti===0 && sg.vib);
        // eko-delay på leadstämman — klassiskt kvarts-eko
        if(ti===0 && sg.echo)
          musNote(tr.wave, nt.m, t + sg.sd*3, Math.min(dur, sg.sd*2.2), tr.vol*0.3, false);
      }
    }
    if(i < sg.drums.length) drumHit(sg.drums[i], t);
    MUS.next += sg.sd; MUS.step++;
  }
}

// ===================== GRAFIKLÄGEN =====================
// '3d'  = förrenderad look (mjuka volymer, gradienter, spegelglans)
// '32'  = detaljerad pixelart (konturer + posteriserade skuggband)
let GFX = 'ark';
try{ const g = localStorage.getItem('slemhamnd_gfx'); if(g==='32'||g==='3d'||g==='ark') GFX = g; }catch(e){}
function setGfx(m){ GFX = m; try{ localStorage.setItem('slemhamnd_gfx', m); }catch(e){} }
function nextGfx(){ setGfx(GFX==='ark' ? '3d' : GFX==='3d' ? '32' : 'ark'); }
function gfxName(){ return GFX==='3d' ? '3D-SPRITES' : GFX==='32' ? '32-BIT' : 'RETRO-ARK'; }
const _colCache = {};
function colShift(c, amt){
  if(typeof c!=='string' || c[0]!=='#') return c;
  const key = c+'|'+amt;
  if(_colCache[key]) return _colCache[key];
  let h = c.length===4 ? '#'+c[1]+c[1]+c[2]+c[2]+c[3]+c[3] : c;
  const r = clamp(parseInt(h.slice(1,3),16)+amt,0,255),
        g = clamp(parseInt(h.slice(3,5),16)+amt,0,255),
        b = clamp(parseInt(h.slice(5,7),16)+amt,0,255);
  return _colCache[key] = 'rgb('+r+','+g+','+b+')';
}
const _gradCache = {};
const HAS_RR = typeof CanvasRenderingContext2D!=='undefined' && !!CanvasRenderingContext2D.prototype.roundRect;
// Skuggad rektangel — alla sprites ritas via denna så bägge lägena får rätt look
function FR(x,y,w,h,c){
  if(w<0){ x+=w; w=-w; } if(h<0){ y+=h; h=-h; }
  if(w<0.5||h<0.5) return;
  if(typeof c!=='string' || c[0]!=='#'){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); return; }
  if(GFX==='3d'){
    ctx.save(); ctx.translate(x,y);
    const hk = Math.max(1, Math.round(h));
    let g = _gradCache[c+'|'+hk];
    if(!g){
      g = ctx.createLinearGradient(0,0,0,hk);
      g.addColorStop(0,colShift(c,42)); g.addColorStop(0.45,c); g.addColorStop(1,colShift(c,-46));
      _gradCache[c+'|'+hk] = g;
    }
    ctx.fillStyle = g;
    if(HAS_RR){ const r = Math.min(w,h)*0.28; ctx.beginPath(); ctx.roundRect(0,0,w,h,r); ctx.fill(); }
    else ctx.fillRect(0,0,w,h);
    ctx.restore();
  } else {
    ctx.fillStyle = colShift(c,-70); ctx.fillRect(x-1,y-1,w+2,h+2);
    ctx.fillStyle = c; ctx.fillRect(x,y,w,h);
    if(h>=4){ ctx.fillStyle = colShift(c,26); ctx.fillRect(x,y,w,Math.max(1,Math.round(h*0.3)));
      ctx.fillStyle = colShift(c,-26); ctx.fillRect(x,y+h-Math.max(1,Math.round(h*0.25)),w,Math.max(1,Math.round(h*0.25))); }
    else { ctx.fillStyle = colShift(c,20); ctx.fillRect(x,y,w,1); }
  }
}
// Skuggad ellips
function FE(x,y,rx,ry,c){
  if(typeof c!=='string' || c[0]!=='#'){
    ctx.fillStyle=c; ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,7); ctx.fill(); return;
  }
  if(GFX==='3d'){
    const g = ctx.createRadialGradient(x-rx*0.35,y-ry*0.45,Math.min(rx,ry)*0.12, x,y,Math.max(rx,ry)*1.2);
    g.addColorStop(0,colShift(c,58)); g.addColorStop(0.55,c); g.addColorStop(1,colShift(c,-58));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.ellipse(x-rx*0.35,y-ry*0.5,rx*0.16,ry*0.12,-0.5,0,7); ctx.fill();
  } else {
    ctx.fillStyle = colShift(c,-70); ctx.beginPath(); ctx.ellipse(x,y,rx+1.5,ry+1.5,0,0,7); ctx.fill();
    ctx.fillStyle = colShift(c,-26); ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,7); ctx.fill();
    ctx.fillStyle = c; ctx.beginPath(); ctx.ellipse(x-rx*0.06,y-ry*0.14,rx*0.92,ry*0.85,0,0,7); ctx.fill();
    ctx.fillStyle = colShift(c,30); ctx.beginPath(); ctx.ellipse(x-rx*0.28,y-ry*0.42,rx*0.4,ry*0.3,0,0,7); ctx.fill();
  }
}
// Skuggad polygon (horn, mantlar, kronspetsar…)
function FP(pts, c){
  const draw = ()=>{ ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]); ctx.closePath(); };
  if(typeof c!=='string' || c[0]!=='#'){ ctx.fillStyle=c; draw(); ctx.fill(); return; }
  let y0=1e9, y1=-1e9;
  for(const p of pts){ if(p[1]<y0)y0=p[1]; if(p[1]>y1)y1=p[1]; }
  if(GFX==='3d'){
    const g = ctx.createLinearGradient(0,y0,0,Math.max(y0+1,y1));
    g.addColorStop(0,colShift(c,40)); g.addColorStop(1,colShift(c,-44));
    ctx.fillStyle = g; draw(); ctx.fill();
  } else {
    ctx.strokeStyle = colShift(c,-70); ctx.lineWidth = 2.5; draw(); ctx.stroke(); ctx.fill();
    ctx.fillStyle = c; draw(); ctx.fill();
  }
}

// ===================== RITHJÄLP =====================
function otext(txt,x,y,size,color,align,outline){
  ctx.font = 'bold '+size+'px monospace';
  ctx.textAlign = align||'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = Math.max(2, size/7); ctx.strokeStyle = outline||'#0a0812';
  ctx.strokeText(txt,x,y); ctx.fillStyle = color; ctx.fillText(txt,x,y);
}
function shadow(x,y,w){
  if(GFX==='3d'){
    const g = ctx.createRadialGradient(x,y,1,x,y,w);
    g.addColorStop(0,'rgba(0,0,0,0.42)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x,y,w,w*0.32,0,0,7); ctx.fill();
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(x,y,w,w*0.32,0,0,7); ctx.fill();
  }
}

// ===================== HJÄLTE-SPRITES v3 (fantasyhjältar med vapen) =====================
// o = {x,y,z,face,pose,t,walk,flash,ghost}
function drawFighter(ch, o){
  const U = 3, P = ch.pal;
  const big = ch.big, TW = big?8:6, LH = 6, TH = big?7:6, HH = 5;
  ctx.save();
  ctx.translate(o.x, o.y - o.z);
  if(o.ghost) ctx.globalAlpha = o.ghost;
  ctx.scale(o.face||1, 1);
  if(big) ctx.scale(1.14,1.14);
  let rot = 0, lx = 0, bob = 0, armF = 'down', armB = 'down', extF = 0, extB = 0, tuck = false, kick = false;
  const t = o.t||0, ph = o.walk||0;
  switch(o.pose){
    case 'walk': lx = Math.round(Math.sin(ph)*2); bob = Math.abs(Math.sin(ph))>0.5?-1:0;
      armF = 'swing'; armB = 'swing'; extF = Math.sin(ph); extB = -Math.sin(ph); break;
    case 'atk1': armF = 'punch'; extF = Math.min(1, t*8); rot = 0.06; break;
    case 'atk2': armB = 'punch'; extB = Math.min(1, t*8); armF = 'guard'; rot = 0.1; break;
    case 'atk3': armF = 'punch'; extF = Math.min(1, t*6); armB = 'up'; rot = 0.16; break;
    case 'air': tuck = true; armF = 'out'; armB = 'up'; break;
    case 'kick': tuck = true; kick = true; armF = 'up'; armB = 'out'; rot = -0.25; break;
    case 'hurt': rot = -0.3; armF = 'up'; armB = 'out'; break;
    case 'down': rot = -1.45; bob = 2; break;
    case 'spin': armF = 'out'; armB = 'out'; lx = 1; break;
    case 'slamup': armF = 'up'; armB = 'up'; break;
    case 'slam': armF = 'punch'; armB = 'punch'; extF = 1; extB = 1; rot = 0.35; break;
    case 'dashpose': rot = 0.9; armF = 'punch'; extF = 1; armB = 'down'; tuck = true; break;
    case 'cast': armF = 'up'; armB = 'up'; bob = -1; break;
    case 'win': armF = 'up'; armB = 'up'; bob = Math.sin(t*8)>0?-2:0; break;
    default: bob = Math.sin(t*3)*0.4; break;
  }
  ctx.rotate(rot);
  const fl = c => o.flash?'#ffffff':c;
  const R = (x,y,w,h,c)=>FR(Math.round(x*U), Math.round(y*U), Math.round(w*U), Math.round(h*U), c);
  const FIST = big?3:2.5;
  const shY = -(LH+TH)+1;
  const wpn = ch.weapon;
  // vapen i näven (ritas efter näven i punch-läge)
  const weaponInHand = (hx, hy)=>{
    if(wpn==='sword'){
      R(hx+FIST-0.4, hy+0.4, 8, 1.5, fl(P.acc));
      FP([[(hx+FIST+7.6)*U,(hy+0.2)*U],[(hx+FIST+9.4)*U,(hy+1.15)*U],[(hx+FIST+7.6)*U,(hy+2.1)*U]], fl(P.acc));
      R(hx+FIST-0.9, hy-0.5, 0.9, 3.2, fl(P.belt));
    } else if(wpn==='daggers'){
      R(hx+FIST-0.3, hy+0.6, 4.5, 1, fl('#c8d0da'));
      FP([[(hx+FIST+4.2)*U,(hy+0.4)*U],[(hx+FIST+5.4)*U,(hy+1.1)*U],[(hx+FIST+4.2)*U,(hy+1.8)*U]], fl('#c8d0da'));
    } else if(wpn==='staff'){
      R(hx+FIST-0.6, hy-0.4, 1, 7, fl('#c89a5a'));
      ctx.strokeStyle = fl(P.acc); ctx.lineWidth = 2.6;
      ctx.beginPath(); ctx.arc((hx+FIST-0.1)*U, (hy-1.6)*U, 2.1*U, 0.7, 5.6); ctx.stroke();
    }
  };
  const arm = (front, mode, ext)=>{
    const sx = front? TW/2-1.5 : -TW/2-0.5;
    const skin = fl(P.skin), shirt = fl(P.shirt);
    const fist = (wpn==='cannon' && front) ? fl(P.belt) : (wpn==='gauntlet' ? fl(P.acc) : skin);
    if(mode==='punch'){
      const len = 2+5*ext;
      R(0, shY, len, 2, shirt); R(len, shY-0.5, FIST, FIST, fist);
      if(wpn==='cannon' && front) R(len, shY-0.5, FIST, 0.8, fl(P.acc));
      if(wpn==='gauntlet'){ FP([[(len+FIST)*U,(shY-0.4)*U],[(len+FIST+1.2)*U,(shY+0.3)*U],[(len+FIST)*U,(shY+1)*U]], fl(P.acc)); }
      if(front || o.pose==='atk2') weaponInHand(len, shY-0.5);
    } else if(mode==='up'){ R(sx, shY-5, 2, 5, shirt); R(sx-0.3, shY-7, FIST, FIST, fist); }
    else if(mode==='out'){ const d = front?1:-1; R(d>0?1:-6, shY, 5, 2, shirt); R(d>0?6:-8, shY-0.3, FIST, FIST, fist); }
    else if(mode==='guard'){ R(1, shY+0.5, 3, 2, shirt); R(3.5, shY, FIST, FIST, fist); }
    else if(mode==='swing'){ const e = ext*1.6; R(sx, shY+0.5, 2, 4.5, shirt); R(sx-0.3+e, shY+4, FIST, FIST, fist); }
    else { R(sx, shY+0.5, 2, 4.5, shirt); R(sx-0.3, shY+4.5, FIST, FIST, fist); }
  };
  const skin = fl(P.skin), shirt = fl(P.shirt), pants = fl(P.pants), hair = fl(P.hair);
  // ---- bakre lager: svärd på ryggen / mantel / ryggsäck / halsduk ----
  if(wpn==='sword' && armF!=='punch' && armB!=='punch' && o.pose!=='spin'){
    ctx.save(); ctx.translate(-TW/2*U, (shY+1)*U); ctx.rotate(-0.85);
    FR(-1.5, -14*U*0.32, 4, 13*U*0.32, fl(P.acc)); FR(-2.5, 1, 6, 2.5, fl(P.belt));
    ctx.restore();
  }
  if(ch.key==='stella'){
    FP([[(-TW/2-1)*U,(shY-0.5)*U],[(TW/2-1)*U,(shY-0.5)*U],[(TW/2-3)*U,(-2)*U],[(-TW/2-2.6)*U,(-2.5)*U]], fl('#d8d0f0'));
  }
  if(ch.key==='rex'){ R(-TW/2-1.6, shY+0.5, 1.8, 4.5, fl('#5a626a')); R(-TW/2-1.4, shY, 1.4, 0.8, fl('#8a8a92')); }
  if(ch.key==='skuggan'){
    for(let i=0;i<3;i++){
      const sy2 = shY-0.6 + Math.sin(t*6+i*1.3)*0.5;
      R(-TW/2-1.8-i*1.7, sy2+i*0.4, 2, 1.3, fl(P.acc));
    }
  }
  if(ch.key==='bull'){
    // fläta + pälsaxelskydd
    R(-TW/2-0.6, shY-3.5, 1.4, 6, hair); R(-TW/2-0.4, shY+2.4, 1, 1.4, fl(P.belt));
    FE((-TW/2+0.5)*U, (shY-0.6)*U, 2.4*U, 1.6*U, fl('#b8935a'));
  }
  // bakre arm
  arm(false, armB, extB);
  // ben
  const legY = -LH+bob*0.3;
  if(tuck){
    if(kick){ R(-1, legY+1, 7, 2, pants); R(6, legY+0.5, 3, 2.5, fl(P.shoe)); R(-2, legY+2, 3, 3, pants); }
    else { R(-2.5, legY+1.5, 3, 3.5, pants); R(0.5, legY+1.5, 3, 3.5, pants); R(-2.5, legY+4.5, 3, 1.5, fl(P.shoe)); R(0.5, legY+4.5, 3, 1.5, fl(P.shoe)); }
  } else {
    R(-2.5-lx*0.5, legY, 2.5, LH, pants); R(0.5+lx*0.5, legY, 2.5, LH, pants);
    R(-3-lx, -1.5, 3.5, 1.5, fl(P.shoe)); R(0.5+lx, -1.5, 3.5, 1.5, fl(P.shoe));
  }
  // Lunas kjol över benens topp
  if(ch.key==='stella' && !tuck){
    FP([[(-TW/2)*U,(-LH-0.5+bob)*U],[(TW/2)*U,(-LH-0.5+bob)*U],[(TW/2+1)*U,(-LH+3)*U],[(-TW/2-1)*U,(-LH+3)*U]], shirt);
  }
  // kropp
  R(-TW/2, -(LH+TH)+bob, TW, TH, shirt);
  R(-TW/2, -LH-1+bob, TW, 1.2, fl(P.belt));
  if(ch.key==='blixt'){ R(-TW/2, shY+0.5, TW, 1, fl(P.acc)); R(TW/2-2.2, shY-0.6, 2.6, 2, fl(P.acc)); }
  if(ch.key==='bull'){ R(-TW/2, shY, 1.5, TH-1, skin); R(TW/2-1.5, shY, 1.5, TH-1, skin); R(-1, shY+1, 2, 3.5, fl(P.acc)); }
  if(ch.key==='skuggan'){ R(-TW/2, shY+2, TW, 1, fl(P.belt)); }
  if(ch.key==='rex'){ R(-1.5, shY+1, 3, 3, fl('#8a8a92')); R(-0.9, shY+1.6, 1.8, 1.8, fl(P.acc)); }
  // huvud
  const hy = -(LH+TH+HH)+bob;
  R(-2.5, hy, 5, HH, skin);
  // ansikte
  ctx.fillStyle = GFX==='32' ? colShift(skin,-70) : 'rgba(20,16,24,0.35)';
  ctx.fillRect(Math.round(0.8*U), Math.round((hy+1.7)*U), Math.round(1.6*U), Math.round(1.6*U));
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(Math.round(1*U), Math.round((hy+2)*U), Math.round(1.2*U), Math.round(1.2*U));
  ctx.fillStyle = '#1a1a20';
  ctx.fillRect(Math.round(1.6*U), Math.round((hy+2.3)*U), Math.round(0.7*U), Math.round(0.7*U));
  ctx.fillStyle = colShift(skin,-46);
  ctx.fillRect(Math.round(0.9*U), Math.round((hy+1.2)*U), Math.round(1.5*U), Math.round(0.45*U));
  if(ch.key==='skuggan'){
    // ansiktsmask
    R(-0.5, hy+3.1, 3.2, 1.6, fl(P.pants));
  } else {
    ctx.fillStyle = colShift(skin,-52);
    ctx.fillRect(Math.round(1.1*U), Math.round((hy+3.9)*U), Math.round(1.1*U), Math.round(0.5*U));
  }
  if(ch.key==='bull'){ R(0.4, hy+3.1, 2.2, 0.5, fl('#c83a2a')); R(0.2, hy+1, 0.5, 2, fl('#c83a2a')); }
  // frisyrer & huvudbonader
  if(ch.key==='blixt'){ R(-2.5, hy-1, 5, 2, hair); R(-3.2, hy-2, 1.6, 2, hair); R(-1.2, hy-2.8, 1.7, 2.4, hair); R(0.8, hy-2.2, 1.6, 2, hair); R(-3, hy, 1, 3, hair); }
  else if(ch.key==='bull'){ R(-2.5, hy-1, 5, 1.6, hair); R(-3, hy-0.4, 1.2, 3, hair); R(1.6, hy-0.6, 1.2, 2, hair); }
  else if(ch.key==='skuggan'){ R(-3, hy-1, 6, 2.4, hair); R(-3, hy-1, 1.2, HH+1, hair); R(-2.5, hy-1.6, 5, 1, fl(P.acc)); }
  else if(ch.key==='rex'){ R(-2.5, hy-1, 5, 1.6, hair);
    R(-2.7, hy+0.2, 5.4, 1, fl('#3a3a44'));
    FE(-0.8*U, (hy+0.7)*U, 1.4, 1.4, fl(P.acc)); FE(1.4*U, (hy+0.7)*U, 1.4, 1.4, fl(P.acc)); }
  else if(ch.key==='stella'){ R(-2.5, hy-1.2, 5, 2, hair);
    FE(-2.6*U, (hy+0.2)*U, 1.9*U*0.42, 1.9*U*0.42, hair);
    R(0.6, hy-2.4, 1.6, 1.6, fl(P.acc)); R(-3.6, hy+0.6, 1.2, 3.6, hair); }
  // hårglans
  if(!o.flash){
    ctx.fillStyle = colShift(P.hair, 44);
    ctx.fillRect(Math.round(-1.8*U), Math.round((hy-0.7)*U), Math.round(2.2*U), Math.round(0.5*U));
  }
  // främre arm (+ vapen)
  arm(true, armF, extF);
  // svepglans vid hugg
  if((o.pose==='atk1'||o.pose==='atk2'||o.pose==='atk3') && t<0.13 && (wpn==='sword'||wpn==='daggers')){
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(2*U, shY*U, (wpn==='sword'?11:8)*U*0.4+8, -0.9, 0.9); ctx.stroke();
  }
  // Lunas stav i vilo-/cast-poser
  if(ch.key==='stella' && armF!=='punch'){
    const rx2 = (o.pose==='cast'||armF==='up') ? 3.4 : 4;
    const ry2 = (o.pose==='cast'||armF==='up') ? shY-8.5 : shY-4;
    R(rx2, ry2, 1, 8, fl('#c89a5a'));
    ctx.strokeStyle = fl(P.acc); ctx.lineWidth = 2.6;
    ctx.beginPath(); ctx.arc((rx2+0.5)*U, (ry2-1.4)*U, 2*U, 0.7, 5.6); ctx.stroke();
  }
  ctx.restore();
}
function drawPortrait(ch, x, y, s){
  const P = ch.pal;
  ctx.save(); ctx.translate(x,y); ctx.scale(s/16,s/16);
  ctx.fillStyle = P.skin; ctx.fillRect(-6,-5,12,12);
  ctx.fillStyle = '#fff'; ctx.fillRect(1,0,3,3); ctx.fillStyle = '#1a1a20'; ctx.fillRect(2.4,1,1.6,1.6);
  ctx.fillStyle = P.hair;
  if(ch.key==='blixt'){ ctx.fillRect(-6,-7,12,4); ctx.fillRect(-8,-8,4,4); ctx.fillRect(-3,-10,4,5); ctx.fillRect(2,-9,4,4); ctx.fillRect(-7,-4,2,7); }
  else if(ch.key==='bull'){ ctx.fillRect(-6,-8,12,4); ctx.fillRect(-8,-5,3,10); ctx.fillStyle='#c83a2a'; ctx.fillRect(-1,-2,1.4,5); }
  else if(ch.key==='skuggan'){ ctx.fillRect(-7,-7,14,5); ctx.fillRect(-7,-7,3,14); ctx.fillStyle=P.acc; ctx.fillRect(-6,-4,12,2); ctx.fillStyle=P.pants; ctx.fillRect(-2,4,8,3.4); }
  else if(ch.key==='rex'){ ctx.fillRect(-6,-7,12,3); ctx.fillStyle='#3a3a44'; ctx.fillRect(-6.5,-5,13,2.6); ctx.fillStyle=P.acc; ctx.fillRect(-3,-5,3,3); ctx.fillRect(2,-5,3,3); }
  else if(ch.key==='stella'){ ctx.fillRect(-6,-8,12,4); ctx.beginPath(); ctx.arc(-7,-2,3.4,0,7); ctx.fill(); ctx.fillStyle=P.acc; ctx.fillRect(2,-10,4,4); }
  ctx.restore();
}

// ===================== SLEM (bossar & bosskärnor) =====================
function slimeBody(x,y,w,h,color,dark,squish,face){
  const sw = w*(1+squish*0.25), sh = h*(1-squish*0.3);
  const flat = typeof color!=='string' || color[0]!=='#';
  if(GFX==='3d' && !flat){
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(x, y-sh*0.16, sw*0.52, sh*0.2, 0, 0, 7); ctx.fill();
    const g = ctx.createRadialGradient(x-sw*0.2, y-sh*0.75, sh*0.08, x, y-sh/2, Math.max(sw,sh)*0.75);
    g.addColorStop(0, colShift(color,64)); g.addColorStop(0.5, color); g.addColorStop(1, colShift(dark,-14));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x, y-sh/2, sw/2, sh/2, 0, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath(); ctx.ellipse(x-sw*0.2, y-sh*0.72, sw*0.13, sh*0.1, -0.5, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.ellipse(x+sw*0.12, y-sh*0.8, sw*0.07, sh*0.05, -0.4, 0, 7); ctx.fill();
  } else {
    ctx.fillStyle = flat? dark : colShift(dark,-30);
    ctx.beginPath(); ctx.ellipse(x, y-sh/2, sw/2+1.8, sh/2+1.8, 0, 0, 7); ctx.fill();
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.ellipse(x, y-sh/2, sw/2, sh/2, 0, 0, 7); ctx.fill();
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(x-sw*0.03, y-sh*0.56, sw*0.44, sh*0.42, 0, 0, 7); ctx.fill();
    if(!flat){
      ctx.fillStyle = colShift(color,34);
      ctx.beginPath(); ctx.ellipse(x-sw*0.14, y-sh*0.68, sw*0.24, sh*0.2, -0.3, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.ellipse(x-sw*0.18, y-sh*0.72, sw*0.1, sh*0.07, -0.5, 0, 7); ctx.fill();
    }
  }
  const ex = x + face*sw*0.16, ey = y-sh*0.55;
  ctx.fillStyle = 'rgba(16,12,20,0.55)';
  ctx.beginPath(); ctx.ellipse(ex-4, ey, 3.9, 4.3, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex+4, ey, 3.9, 4.3, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(ex-4, ey, 3.2, 3.6, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex+4, ey, 3.2, 3.6, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#1a1a20';
  ctx.beginPath(); ctx.arc(ex-4+face*1.2, ey, 1.6, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+4+face*1.2, ey, 1.6, 0, 7); ctx.fill();
  if(GFX==='3d'){
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillRect(ex-4+face*1.2, ey-1.4, 1.1, 1.1); ctx.fillRect(ex+4+face*1.2, ey-1.4, 1.1, 1.1);
  }
}

// ===================== FIENDER: SLEMLIGANS LIGISTER =====================
// Humanoida hantlangare i klassisk beat 'em up-anda — alla är originaldesigner.
const HENCH = {
 grunt:  {uni:'#3a7a6a', pants:'#2a5a4e', skin:'#d8b090', head:'mask', maskC:'#2a5a4e', emblem:'#7ee84a'},
 snabb:  {uni:'#8a2a34', pants:'#3a3a44', skin:'#e8c098', head:'mohawk', hawk:'#ffd23c', item:'bat'},
 kastare:{uni:'#3a3a56', pants:'#2a2a40', skin:'#d8b090', head:'mask', maskC:'#1a1a2e', emblem:'#8a5ae0', item:'shuriken'},
 skold:  {uni:'#5a6a7a', pants:'#3a4450', skin:'#d8b090', head:'helm', item:'riot'},
 fet:    {uni:'#7a3a8a', pants:'#3a3040', skin:'#e0a878', head:'bald', big:true}
};
function drawHench(e, sx, sy, flash, wind){
  const cfg = HENCH[e.kind];
  const f = e.face;
  const fl2 = c => flash?'#ffffff':(wind? colShift(c,50):c);
  const uni = fl2(cfg.uni), pants2 = fl2(cfg.pants), skin2 = fl2(cfg.skin);
  const walkP = Math.sin(e.bph||0);
  const lx = e.state==='chase' ? Math.round(walkP*2.4) : 0;
  const attacking = e.state==='atk', winding = e.state==='windup';
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(f, 1);
  if(cfg.big) ctx.scale(1.35, 1.35);
  // ben + skor
  FR(-8-lx, -14, 7, 14, pants2); FR(1+lx, -14, 7, 14, pants2);
  FR(-9-lx, -4, 9, 4, fl2('#26262e')); FR(1+lx, -4, 9, 4, fl2('#26262e'));
  // bakre arm
  if(winding){ FR(-9, -38, 5, 10, uni); FR(-10, -44, 6, 7, skin2);
    if(cfg.item==='shuriken'){ drawShuriken(-7, -47, 5, flash); }
  } else FR(-10, -28, 5, 11, uni);
  // torso
  FR(-9, -30, 18, 17, uni);
  FR(-9, -16, 18, 3, fl2('#26262e'));
  if(cfg.emblem){ FE(3, -24, 3.2, 3.2, fl2(cfg.emblem)); }
  if(cfg.big){ FR(-9, -30, 4, 14, skin2); FR(5, -30, 4, 14, skin2); }
  // främre arm (+ tillhygge)
  if(attacking){
    FR(2, -28, 12, 5, uni); FR(12, -29, 7, 7, skin2);
    if(cfg.item==='bat'){ FR(17, -31, 14, 4, fl2('#a8845a')); }
    if(cfg.item==='shuriken'){ /* kastad — projektilen syns i luften */ }
  } else if(winding){
    FR(4, -38, 5, 10, uni); FR(3, -45, 7, 7, skin2);
    if(cfg.item==='bat'){ ctx.save(); ctx.translate(6,-44); ctx.rotate(-1.1); FR(0, -14, 4, 14, fl2('#a8845a')); ctx.restore(); }
  } else {
    FR(5, -28, 5, 11, uni);
    if(cfg.item==='bat'){ FR(8, -22, 3, 12, fl2('#a8845a')); }
  }
  // huvud
  FR(-6, -42, 12, 12, skin2);
  if(cfg.head==='mask'){
    FR(-6, -42, 12, 5, fl2(cfg.maskC));
    FR(-6, -34, 12, 4, fl2(cfg.maskC));
    // ögonspringa
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, -37.5, 3.4, 2.6);
    ctx.fillStyle = '#1a1a20'; ctx.fillRect(1.8, -37, 1.8, 1.8);
    // bandände
    FR(-9, -40, 3, 2, fl2(cfg.maskC));
  } else if(cfg.head==='mohawk'){
    for(let i=0;i<4;i++) FP([[-5+i*3,-42],[-3.6+i*3,-49-(i%2)*2],[-2.2+i*3,-42]], fl2(cfg.hawk));
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0.5, -38, 3, 2.6);
    ctx.fillStyle = '#1a1a20'; ctx.fillRect(2.2, -37.5, 1.6, 1.6);
    ctx.fillStyle = colShift(cfg.skin,-52); ctx.fillRect(1, -32.6, 3, 1.2);
  } else if(cfg.head==='helm'){
    FR(-7, -44, 14, 8, fl2('#4a5560'));
    FR(-6, -38, 12, 4, fl2('#8ac8e8'));
    FR(-7, -33.6, 14, 2, fl2('#4a5560'));
  } else {
    // flintis med solglasögon (bjässen)
    FR(-6, -38.5, 12, 3, fl2('#1a1a20'));
    ctx.fillStyle = colShift(cfg.skin,-52); ctx.fillRect(0.6, -32.8, 3.4, 1.4);
    FR(-6, -30.8, 12, 1.6, fl2('#3a2a1a'));
  }
  // elit: rött pannband
  if(e.elite){ FR(-6.5, -44.5, 13, 2.6, flash?'#ffffff':'#e83a2a'); FR(-9.5, -43, 3, 2, flash?'#ffffff':'#e83a2a'); }
  ctx.restore();
}
function drawShuriken(x, y, r, flash){
  ctx.save(); ctx.translate(x, y); ctx.rotate((time||0)*10);
  const c = flash?'#ffffff':'#aab2ba';
  FP([[-r,0],[0,-r*0.35],[r,0],[0,r*0.35]], c);
  FP([[0,-r],[r*0.35,0],[0,r],[-r*0.35,0]], c);
  ctx.fillStyle = '#3a3a44'; ctx.beginPath(); ctx.arc(0,0,r*0.25,0,7); ctx.fill();
  ctx.restore();
}
function drawDrone(e, sx, sy, flash, wind){
  const body = flash?'#ffffff':'#6a7282', dark = flash?'#dddddd':'#4a525c';
  const tilt = e.state==='atk' ? 0.4*Math.sign(e.swoopVx||1)*e.face : 0;
  ctx.save(); ctx.translate(sx, sy); ctx.rotate(tilt);
  // rotor (suddig)
  ctx.fillStyle = 'rgba(200,210,220,0.4)';
  ctx.beginPath(); ctx.ellipse(0, -26, 20, 2.6, 0, 0, 7); ctx.fill();
  FR(-1.5, -26, 3, 5, dark);
  FE(0, -14, 13, 10, body);
  FR(-13, -15, 26, 3, dark);
  // öga
  ctx.fillStyle = e.state==='windup'||wind ? '#ff4a3a' : '#5ae0e0';
  ctx.beginPath(); ctx.arc(e.face*5, -14, 3.6, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillRect(e.face*5-1, -16.4, 1.6, 1.6);
  // gripklor
  FR(-8, -5, 3, 5, dark); FR(5, -5, 3, 5, dark);
  ctx.restore();
}
function drawBombot(e, sx, sy, flash){
  const arm = e.fuse!==undefined;
  const bl = arm && Math.floor(e.t*(4+ (1.6-e.fuse)*8))%2===0;
  const body = flash?'#ffffff':(bl?'#ff5a3a':'#4a4a52');
  // små ben
  FR(sx-8, sy-6, 4, 6, flash?'#dddddd':'#2a2a32'); FR(sx+4, sy-6, 4, 6, flash?'#dddddd':'#2a2a32');
  FE(sx, sy-16, 12, 11, body);
  FR(sx-7, sy-19, 6, 4, flash?'#dddddd':'#2a2a32');
  // öga
  ctx.fillStyle = bl?'#fff':'#ffd23c';
  ctx.beginPath(); ctx.arc(sx+e.face*4, sy-17, 3, 0, 7); ctx.fill();
  // stubintråd
  ctx.strokeStyle = '#c89a5a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(sx, sy-27); ctx.quadraticCurveTo(sx+4, sy-32, sx+2, sy-35); ctx.stroke();
  if(arm){ ctx.fillStyle = pick(['#ffd23c','#ff9a2a','#fff']); ctx.fillRect(sx+1, sy-38, 3, 3); }
}
const EBARH = {grunt:56, snabb:58, kastare:56, skold:56, fet:74, robot:42, bomb:46, flyg:38};
function drawEBar(e){
  const d = ETYPES[e.kind], sx = e.x-camX, sy = e.y - e.z;
  const bw = d.big?42:30, bh = (EBARH[e.kind]||54) + 8;
  const frac = clamp(e.hp/e.maxhp, 0, 1);
  ctx.fillStyle = 'rgba(10,8,18,0.75)'; ctx.fillRect(sx-bw/2, sy-bh, bw, 5);
  ctx.fillStyle = frac>0.5?'#7ee84a': frac>0.25?'#ffd23c':'#ff5a4e';
  ctx.fillRect(sx-bw/2+1, sy-bh+1, (bw-2)*frac, 3);
  if(e.elite){ otext('★', sx-bw/2-7, sy-bh+2, 10, '#ff5a4e'); }
}
function drawEnemy(e){
  const d = ETYPES[e.kind], sx = e.x-camX, sy = e.y - e.z;
  const flash = e.flashT>0 && (Math.floor(e.flashT*30)%2===0);
  shadow(sx, e.y, d.big?26:14);
  // ark-läget: humanoida ligister ritas med riktiga sprites (egen liggande frame — ingen rotation)
  if(GFX==='ark' && ARK.ready && ARKENEMY[e.kind]){
    drawEnemyArk(e);
    drawEBar(e);
    return;
  }
  ctx.save();
  if(e.state==='down'){ ctx.translate(sx,sy); ctx.rotate(1.3); ctx.translate(-sx,-sy); }
  const wind = e.state==='windup' && Math.floor(e.t*14)%2===0;
  if(e.kind==='flyg') drawDrone(e, sx, sy, flash, wind);
  else if(e.kind==='bomb') drawBombot(e, sx, sy, flash);
  else if(e.kind==='robot'){
    FR(sx-10, sy-8, 20, 8, wind?'#ffffff':'#5a626a');
    FR(sx-9, sy-26, 18, 18, wind?'#eeeeee':(flash?'#ffffff':d.color));
    FR(sx-7, sy-23, 14, 5, '#2a3038');
    ctx.fillStyle = e.state==='windup'?'#ff4a3a':'#5ae0e0';
    ctx.fillRect(sx-6+(Math.sin(e.t*6)*4+4), sy-22, 3, 3);
    FR(sx+e.face*9, sy-19, e.face*8, 5, '#5a626a');
    FR(sx-1, sy-30, 2, 5, '#5a626a'); FR(sx-1.5, sy-32, 3, 3, '#ff4a3a');
  }
  else {
    drawHench(e, sx, sy, flash, wind);
    if(e.kind==='skold'){
      // kravallsköld hålls framför
      ctx.save(); ctx.translate(sx, sy); ctx.scale(e.face,1);
      FR(9, -34, 8, 30, flash?'#ffffff':'#7a8a9a');
      FR(10.5, -31, 5, 24, flash?'#eeeeee':'rgba(160,200,230,0.55)');
      FR(9, -22, 8, 3, flash?'#ffffff':'#5a6a7a');
      ctx.restore();
    }
    if(e.kind==='snabb' && e.state==='chase'){
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(sx-e.face*16, sy-24, e.face*6, 2); ctx.fillRect(sx-e.face*19, sy-16, e.face*6, 2);
    }
  }
  ctx.restore();
  drawEBar(e);
}

// pose → frames [rad,kolumn] — riddaren (10 kolumner à 120×110)
const ARKF = {

const ARK = { ready:false, imgs:{}, variants:{}, whites:{} };
function arkRecolor(img, W, H, tunic, armor){
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d'); g.drawImage(img, 0, 0);
  if(tunic || armor){
    const id = g.getImageData(0, 0, W, H), d = id.data;
    const pc = hex => [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    const T = tunic ? pc(tunic) : null, A = armor ? pc(armor) : null;
    for(let i=0;i<d.length;i+=4){
      if(d[i+3]<40) continue;
      const r = d[i], gg = d[i+1], b = d[i+2];
      if(T && r>60 && r>gg*1.4 && r>b*1.4){
        const lum = r/185;
        d[i]=clamp(Math.round(T[0]*lum),0,255); d[i+1]=clamp(Math.round(T[1]*lum),0,255); d[i+2]=clamp(Math.round(T[2]*lum),0,255);
      } else if(A && Math.abs(r-gg)<22 && Math.abs(gg-b)<22 && (r+gg+b)/3>62 && (r+gg+b)/3<235){
        const lum = (r+gg+b)/3/165;
        d[i]=clamp(Math.round(A[0]*lum),0,255); d[i+1]=clamp(Math.round(A[1]*lum),0,255); d[i+2]=clamp(Math.round(A[2]*lum),0,255);
      }
    }
    g.putImageData(id, 0, 0);
  }
  // baka mörk kontur: siluett i 4 riktningar + spriten ovanpå
  const sil = document.createElement('canvas'); sil.width = W; sil.height = H;
  const sg = sil.getContext('2d'); sg.drawImage(c, 0, 0);
  sg.globalCompositeOperation = 'source-in';
  sg.fillStyle = '#100c18'; sg.fillRect(0, 0, W, H);
  const out = document.createElement('canvas'); out.width = W; out.height = H;
  const og = out.getContext('2d');
  for(const [ox,oy] of [[1.4,0],[-1.4,0],[0,1.4],[0,-1.4]]) og.drawImage(sil, ox, oy);
  og.drawImage(c, 0, 0);
  return out;
}
function arkWhite(img, W, H){
  const w = document.createElement('canvas'); w.width = W; w.height = H;
  const wg = w.getContext('2d'); wg.drawImage(img, 0, 0);
  wg.globalCompositeOperation = 'source-in';
  wg.fillStyle = '#ffffff'; wg.fillRect(0, 0, W, H);
  return w;
}
function initArk(){
  try{
    let loaded = 0;
    const done = ()=>{
      if(++loaded < 2) return;
      try{
        const kW = 1200, kH = 1100, bW = 1044, bH = 615;
        const kimg = ARK.imgs.k, bimg = ARK.imgs.b;
        for(const key in ARKHERO){
          const c = ARKHERO[key];
          ARK.variants['h_'+key] = c.body==='k'
            ? arkRecolor(kimg, kW, kH, c.tunic, c.armor)
            : arkRecolor(bimg, bW, bH, null, c.shirt);
        }
        for(const kind in ARKENEMY){
          const c = ARKENEMY[kind];
          ARK.variants['e_'+kind] = c.body==='k'
            ? arkRecolor(kimg, kW, kH, c.tunic, c.armor)
            : arkRecolor(bimg, bW, bH, null, c.shirt);
          ARK.variants['e_'+kind+'_x'] = c.body==='k'
            ? arkRecolor(kimg, kW, kH, ELITE_TINT, c.armor)
            : arkRecolor(bimg, bW, bH, null, ELITE_TINT);
        }
        ARK.whites.k = arkWhite(kimg, kW, kH);
        ARK.whites.b = arkWhite(bimg, bW, bH);
        ARK.ready = true;
      }catch(e){}
    };
    const ki = new Image(); ki.onload = done; ki.src = 'data:image/png;base64,'+KNIGHT_B64; ARK.imgs.k = ki;
    const bi = new Image(); bi.onload = done; bi.src = 'data:image/png;base64,'+BRAWLER_B64; ARK.imgs.b = bi;
  }catch(e){}
}
initArk();
// generell ark-ritning: kropp + variant + pose + klocka
function drawArkSprite(bodyKey, variant, pose, clock, x, y, face, scale, ghost, flash){
  const body = ARKBODIES[bodyKey];
  const map = bodyKey==='k' ? ARKF : ARKF_B;
  const anim = map[pose] || map.idle;
  const n = anim.f.length;
  let idx = 0;
  if(n>1){
    const cl = (isFinite(clock) && clock>=0) ? clock*anim.fps : 0;
    if(anim.loop){
      if(anim.ping && n>2){ const m = 2*n-2; const k = Math.floor(cl)%m; idx = k<n ? k : m-k; }
      else idx = Math.floor(cl)%n;
    } else idx = Math.min(n-1, Math.floor(cl));
  }
  const fr = anim.f[idx] || anim.f[0];
  const src = flash ? ARK.whites[bodyKey] : ARK.variants[variant];
  if(!src) return;
  ctx.save();

    if(p.z<=0 && p.vz<0){
      p.z = 0; p.state='idle';
      sfx('slam'); addShake(9, 0.4); hitstopT = Math.max(hitstopT, 0.05);
      effects.push({kind:'shock', x:p.x, y:p.y, t:0, dur:0.45, r:170});
      for(const e of enemies){
        if(Math.abs(e.x-p.x)<170 && Math.abs(e.y-p.y)<90 && e.z<40) damageEnemy(e, p.ch.spDmg, p, true);
      }
      burst(p.x, p.y, '#c8b89a', 14, 140);
    }
  } else if(k==='skuggan'){
    p.pose = 'dashpose';
    p.x += p.face*820*dt;
    p.trail.push({x:p.x, y:p.y, t:0.22});
    for(const e of enemies){
      if(!p.dashHit.has(e) && Math.abs(e.x-p.x)<40 && Math.abs(e.y-p.y)<34){
        p.dashHit.add(e); damageEnemy(e, p.ch.spDmg, p, true);
      }
    }
    if(p.spT>0.4){ p.state='idle'; }
  } else if(k==='rex'){
    p.pose = 'atk3';
    if(p.spT>0.45) p.state='idle';
  } else if(k==='stella'){
    p.pose = 'cast';
    if(p.spT>0.8) p.state='idle';
  }
  p.x = clamp(p.x, camX+16, camX+VW-16);
  p.y = clamp(p.y, YMIN, YMAX);
}
function reviveP(p, frac){
  p.state = 'idle'; p.pose = 'idle'; p.hp = Math.max(1, Math.round(p.maxhp*(frac||0.5)));
  p.invT = 1.5; p.revP = 0;
  sfx('revive'); burst(p.x, p.y, '#7ee84a', 12, 80);
  ftext(p.x, p.y-80, 'UPPE IGEN!', '#7ee84a', true);
}
function damagePlayer(p, dmg, srcX){
  if(p.invT>0 || p.state==='down' || p.state==='special' || state!=='play') return;
  p.hp -= dmg;
  p.combo = 0;
  sfx('hurt');
  burst(p.x, p.y, '#ff5a4e', 5, 60);
  addShake(3, 0.15);
  if(p.hp<=0){
    p.hp = 0; p.state = 'down'; p.pose = 'down'; p.downT = 9; p.invT = 1;
    sfx('down');
    ftext(p.x, p.y-80, p.ch.name+' ÄR NERE!', '#ff5a4e', true);
    if(nAlive()===0 && state==='play'){ state = 'over'; overT = 10; setSong('over'); }
  } else {
    p.state = 'hurt'; p.pose = 'hurt'; p.hurtT = 0.35; p.invT = 0.9;
    p.vx = (p.x<srcX?-1:1)*160;
  }
}
function doHit(p, dmg, kd, reach){
  let hit = false;
  const rx = reach||52;
  for(const e of enemies){
    const dx = e.x - p.x;
    if(dx*p.face > 6 && dx*p.face < rx && Math.abs(e.y-p.y) < 30 && Math.abs(e.z-p.z) < 56){
      damageEnemy(e, dmg, p, kd); hit = true;
    }
  }
  for(const c of containers){
    const dx = c.x - p.x;
    if(!c.broken && dx*p.face > 0 && dx*p.face < rx && Math.abs(c.y-p.y) < 30){ breakCont(c); hit = true; }
  }
  if(hit){
    p.sp = Math.min(100, p.sp + (p.ch.support?9:6));
    p.combo++; p.comboShow = 1.2;
    if(kd) { hitstopT = Math.max(hitstopT, 0.04); addShake(4,0.12); }
  }
  return hit;
}
function updPlayer(p, dt){
  p.t += dt;
  p.invT = Math.max(0, p.invT-dt);
  p.comboShow = Math.max(0, p.comboShow-dt);
  if(p.comboShow<=0) p.combo = 0;
  p.comboT = Math.max(0, p.comboT-dt);
  for(const tr of p.trail) tr.t -= dt;
  p.trail = p.trail.filter(tr=>tr.t>0);
  if(p.state==='down'){
    p.downT -= dt;
    // lagkamrat intill kan hjälpa upp — håll SLÅ
    let helper = null;
    for(const q of players){
      if(q!==p && q.state!=='down' && Math.abs(q.x-p.x)<56 && Math.abs(q.y-p.y)<44){
        const inp = q.lastInp;
        if(inp && (inp.aH||inp.aP)){ helper = q; break; }
      }
    }
    if(helper){
      p.revP += dt*(helper.ch.support?3:0.9);
      if(p.revP>=1) reviveP(p, helper.ch.support?0.6:0.5);
    } else p.revP = Math.max(0, p.revP-dt*0.5);
    if(p.downT<=0) reviveP(p, 0.4);
    return;
  }
  if(p.state==='hurt'){
    p.hurtT -= dt;
    p.x += p.vx*dt; p.vx *= (1-4*dt);
    if(p.hurtT<=0){ p.state='idle'; p.pose='idle'; }
    p.x = clamp(p.x, camX+16, camX+VW-16);
    return;
  }
  if(p.state==='special'){ updSpecial(p, dt); return; }
  const inp = getInput(p.ctrlId);
  p.lastInp = inp;
  if(p.state==='atk'){
    p.atkT += dt;
    const durs = [0.2, 0.2, 0.3];
    const dur = durs[p.atkN];
    p.x += p.face*30*dt;
    if(!p.atkHit && p.atkT > 0.08){
      p.atkHit = true;
      const kd = p.atkN===2 || p.jumpAtk;
      if(doHit(p, p.ch.dmg[p.atkN] + (p.jumpAtk?2:0), kd)) sfx(kd?'hit2':'hit');
    }
    if(inp.aP && p.atkT > dur*0.45 && p.atkN<2 && !p.jumpAtk) p.queued = true;
    if(p.z>0){ p.vz -= GRAV*dt; p.z += p.vz*dt; if(p.z<=0){ p.z=0; p.vz=0; } }
    if(p.atkT >= dur){
      if(p.queued){ p.queued=false; p.atkN++; p.atkT=0; p.atkHit=false; p.pose='atk'+(p.atkN+1); sfx('swing'); }
      else { p.state='idle'; p.pose='idle'; p.comboT=0.6; p.jumpAtk=false; }
    }
    return;
  }
  // rörelse
  const sp = p.ch.speed;
  p.x += inp.x*sp*dt; p.y += inp.y*sp*0.72*dt;
  if(inp.x!==0) p.face = inp.x>0?1:-1;
  const moving = inp.x!==0||inp.y!==0;
  // hopp
  if(p.z>0){
    p.vz -= GRAV*dt; p.z += p.vz*dt;
    if(p.z<=0){ p.z=0; p.vz=0; sfx('land'); parts.push({x:p.x,y:p.y,z:2,vx:-30,vy:0,vz:20,life:0.25,color:'#8a8692',size:2},{x:p.x,y:p.y,z:2,vx:30,vy:0,vz:20,life:0.25,color:'#8a8692',size:2}); }
    p.pose = 'air';
  } else p.pose = moving?'walk':'idle';
  if(inp.jP && p.z===0){ p.vz = JUMPV; p.z = 1; sfx('jump'); }
  if(moving && p.z===0) p.walk += dt*11;
  // attack (autorepeterar vid hållen knapp)
  p.autoT = inp.aH ? p.autoT+dt : 0;
  const wantAtk = inp.aP || (inp.aH && p.autoT>0.32);
  if(wantAtk){
    p.autoT = 0;
    if(p.ch.ranged && p.z===0){
      // Stella skjuter stjärnor
      p.state='atk'; p.atkN = p.comboT>0? Math.min(2,p.atkN+1):0; p.atkT=0; p.atkHit=true; p.pose='atk1';
      sfx('star');
      projs.push({kind:'star', x:p.x+p.face*22, y:p.y, z:30, vx:p.face*460, dmg:p.ch.dmg[p.atkN], from:'p', owner:p, t:0, life:0.65, hitIds:new Set()});
    } else if(p.z>0 && p.vz<200){
      p.state='atk'; p.atkN=2; p.atkT=0; p.atkHit=false; p.jumpAtk=true; p.pose='kick'; sfx('swing');
    } else if(p.z===0){
      p.atkN = p.comboT>0 ? Math.min(2, p.atkN+1) : 0;
      p.state='atk'; p.atkT=0; p.atkHit=false; p.queued=false; p.pose='atk'+(p.atkN+1); sfx('swing');
    }
  }
  // special
  if(inp.sP){
    if(p.sp>=100) startSpecial(p);
    else { sfx('nospecial'); ftext(p.x, p.y-76, 'Ladda specialmätaren!', '#8a86a0'); }
  }
  // Stella helar passivt vänner intill
  if(p.ch.support){
    for(const q of players) if(q!==p && q.state!=='down' && q.hp<q.maxhp && Math.abs(q.x-p.x)<90 && Math.abs(q.y-p.y)<70){
      q.hp = Math.min(q.maxhp, q.hp + 2.2*dt);
      if(Math.random()<dt*2) parts.push({x:q.x+rnd(-12,12), y:q.y, z:30+rnd(0,20), vx:0, vy:0, vz:40, life:0.5, color:'#7ee84a', size:2});
    }
  }
  p.x = clamp(p.x, camX+16, camX+VW-16);
  p.y = clamp(p.y, YMIN, YMAX);
}

// ===================== FIENDESKADA & DROPS =====================
function damageEnemy(e, dmg, src, kd){
  if(e.dead || (e.boss && e.introT>0)) return;
  // sköldslem blockerar framifrån (hoppattacker och specials går igenom)
  if(e.shield && !kd && src && src.z<20 && (src.x-e.x)*e.face<0 && e.state!=='hurt' && e.state!=='down'){
    e.hp -= dmg*0.15;
    sfx('hit'); ftext(e.x, e.y-50, 'BLOCK', '#aab2ba');
    e.x += e.face*-8;
    if(e.hp<=0) killEnemy(e, src);
    return;
  }
  e.hp -= dmg;
  e.flashT = 0.15;
  if(src && src.ch) { src.score += 10; }
  ftext(e.x+rnd(-8,8), e.y-(e.boss?110:46)-e.z, ''+Math.round(dmg), e.boss?'#ffd23c':'#fff');
  burst(e.x, e.y, e.boss?'#7ee84a':(ETYPES[e.kind]?ETYPES[e.kind].color:'#7ee84a'), 4, 70);
  if(e.hp<=0){ killEnemy(e, src); return; }
  if(e.boss){ if(Math.random()<0.15) sfx('bosshurt'); return; }
  if(kd){ e.state = 'down'; e.t = 0; e.downT = 1.1; e.z = Math.max(e.z, 2); e.vz = 160; e.x += (e.x<src.x?-1:1)*-14; }
  else if(!ETYPES[e.kind].big || Math.random()<0.4){ e.state = 'hurt'; e.t = 0.6; }
}
function killEnemy(e, src){
  if(e.dead) return;
  e.dead = true;
  sfx('splat');
  const col = e.boss? '#5ac83c' : ETYPES[e.kind].color;
  burst(e.x, e.y, col, e.boss?30:12, e.boss?200:110);
  if(src && src.ch){ src.score += e.boss? 2000 : ETYPES[e.kind].pts; src.kills++; }
  if(!e.boss && Math.random()<0.55) dropItem(e.x, e.y);
  enemies = enemies.filter(q=>q!==e);
  if(e.boss) onBossDead(e);
}
function dropItem(x, y, force){
  const r = Math.random();
  let kind = null;
  if(force) kind = force;
  else if(r<0.42) kind = 'mynt';
  else if(r<0.60) kind = 'lask';
  else if(r<0.72) kind = 'kott';
  else if(r<0.80) kind = 'pizza';
  else if(r<0.88) kind = 'stjarna';
  if(kind) pickups.push({kind, x:x+rnd(-10,10), y:clamp(y+rnd(-10,10),YMIN,YMAX), z:40, vz:120, t:0});
}
function breakCont(c){
  c.broken = true; sfx('break');
  burst(c.x, c.y, c.pal||'#8a8272', 10, 100);
  const r = Math.random();
  dropItem(c.x, c.y, r<0.35?'mynt': r<0.55?'lask': r<0.7?'kott': r<0.82?'pizza':'stjarna');
}
</script>
<script>
'use strict';
// ===================== FIENDER =====================
function mkEnemy(kind, x, y, elite){
  const d = ETYPES[kind];
  const mult = (0.9 + 0.35*Math.max(1,players.length)) * (elite?1.7:1);
  return { kind, x, y, z: d.fly?46:0, vz:0, hp:Math.round(d.hp*mult), maxhp:Math.round(d.hp*mult),
    face:-1, state:'chase', t:0, bph:Math.random()*6, cd:rnd(0.2,0.8), flashT:0, downT:0,
    shield: d.shield, fly: d.fly, elite: !!elite,
    dmg2: d.dmg + (elite?4:0), spd2: d.speed * (elite?1.25:1) };
}
function nearestPlayer(e){
  let best = null, bd = 1e9;
  for(const p of players){
    if(p.state==='down') continue;
    const d = Math.abs(p.x-e.x) + Math.abs(p.y-e.y)*1.5;
    if(d<bd){ bd = d; best = p; }
  }
  return best;
}
function updEnemy(e, dt){
  const d = ETYPES[e.kind];
  e.t += dt; e.bph += dt*(e.state==='chase'?7:3);
  e.flashT = Math.max(0, e.flashT-dt);
  if(e.state==='down'){
    e.vz -= GRAV*dt; e.z += e.vz*dt; if(e.z<0){ e.z=0; e.vz=0; }
    e.downT -= dt;
    if(e.downT<=0 && e.z===0){ e.state='chase'; e.cd = 0.4; }
    return;
  }
  if(e.state==='hurt'){ e.t -= dt*4; if(e.t<=0) e.state='chase'; return; }
  if(e.fly && e.state!=='atk') e.z = 40 + Math.sin(e.bph*0.8)*18;
  const t = nearestPlayer(e);
  if(!t){ e.state='chase'; return; }
  e.face = t.x>e.x?1:-1;
  const spd = e.spd2 || d.speed;
  if(e.state==='chase'){
    e.cd -= dt;
    let tx, ty = t.y;
    if(d.ranged||d.laser){ tx = t.x - e.face*230; if(Math.abs(e.x-t.x)<170) tx = e.x - e.face*60; }
    else tx = t.x - e.face*(d.big?46:34);
    const dx = tx-e.x, dy = ty-e.y;
    if(Math.abs(dx)>6) e.x += Math.sign(dx)*spd*dt;
    if(Math.abs(dy)>5) e.y += Math.sign(dy)*spd*0.7*dt;
    // separera fiender så de inte staplas
    for(const o of enemies) if(o!==e && !o.boss && Math.abs(o.x-e.x)<26 && Math.abs(o.y-e.y)<16){
      e.x += Math.sign(e.x-o.x || (Math.random()-0.5))*30*dt; e.y += Math.sign(e.y-o.y||1)*24*dt;
    }
    if(d.bomber){
      if(Math.abs(t.x-e.x)<56 && Math.abs(t.y-e.y)<30 && e.fuse===undefined){ e.fuse = 1.4; sfx('warn'); }
    } else if(d.laser){
      if(e.cd<=0 && Math.abs(t.y-e.y)<16 && Math.abs(t.x-e.x)<400){ e.state='windup'; e.t=0; sfx('warn'); }
    } else if(d.ranged){
      if(e.cd<=0 && Math.abs(t.x-e.x)>120){ e.state='windup'; e.t=0; }
    } else if(e.fly){
      if(e.cd<=0 && Math.abs(t.x-e.x)<160 && Math.abs(t.y-e.y)<40){ e.state='windup'; e.t=0; }
    } else {
      if(e.cd<=0 && Math.abs(t.x-e.x)<(d.big?62:50) && Math.abs(t.y-e.y)<20){ e.state='windup'; e.t=0; }
    }
  }
  if(e.fuse!==undefined){
    e.fuse -= dt;
    if(e.fuse<=0){
      sfx('explode'); addShake(6,0.3);
      effects.push({kind:'explo', x:e.x, y:e.y, t:0, dur:0.4, r:84});
      for(const p of players) if(Math.abs(p.x-e.x)<84 && Math.abs(p.y-e.y)<52) damagePlayer(p, e.dmg2||d.dmg, e.x);
      burst(e.x, e.y, '#ff9a2a', 18, 180);
      enemies = enemies.filter(q=>q!==e);
      return;
    }
  }
  if(e.state==='windup'){
    const wdur = d.laser?0.7 : d.ranged?0.5 : e.fly?0.4 : 0.42;
    if(e.t>=wdur){
      e.state='atk'; e.t=0;
      if(d.laser){
        sfx('laser');
        effects.push({kind:'beam', x:e.x+e.face*18, y:e.y, t:0, dur:0.22, face:e.face, dmg:e.dmg2||d.dmg});
      } else if(d.ranged){
        sfx('blob');
        const dx = t.x-e.x, fly = Math.abs(dx)/300;
        projs.push({kind:'blob', shu:e.kind==='kastare', x:e.x, y:e.y, z:30, vx:Math.sign(dx)*300, vy:(t.y-e.y)/Math.max(0.3,fly), vz:150, dmg:e.dmg2||d.dmg, from:'e', t:0, hitIds:new Set()});
      } else if(e.fly){
        e.swoopVx = Math.sign(t.x-e.x)*300; e.swoopVy = (t.y-e.y)*2;
      }
    }
  } else if(e.state==='atk'){
    if(e.fly){
      e.x += e.swoopVx*dt; e.y += e.swoopVy*dt;
      e.z = Math.max(8, e.z - 130*dt);
      for(const p of players) if(p.invT<=0 && Math.abs(p.x-e.x)<26 && Math.abs(p.y-e.y)<20 && e.z<44) damagePlayer(p, e.dmg2||d.dmg, e.x);
      if(e.t>0.55){ e.state='chase'; e.cd = rnd(0.9,1.5); }
    } else if(!d.ranged && !d.laser){
      if(e.t>0.12 && !e.hitDone){
        e.hitDone = true;
        for(const p of players){
          if(Math.abs(p.x-e.x)<(d.big?66:52) && Math.abs(p.y-e.y)<24 && p.z<40) damagePlayer(p, e.dmg2||d.dmg, e.x);
        }
      }
      if(e.t>0.3){ e.state='chase'; e.hitDone=false; e.cd = rnd(0.6,1.1); }
    } else if(e.t>0.3){ e.state='chase'; e.cd = d.laser?rnd(1.2,1.8):rnd(1.0,1.6); }
  }
  e.y = clamp(e.y, YMIN, YMAX);
  e.x = clamp(e.x, camX-60, camX+VW+60);
}

// ===================== BOSSAR =====================
function mkBoss(bkind, hp){
  const mult = 0.75 + 0.35*Math.max(1,players.length);
  return { boss:true, bkind, x: camX+VW-140, y: 430, z:0, vz:0,
    hp:Math.round(hp*mult), maxhp:Math.round(hp*mult), phase:1,
    face:-1, state:'idle', t:0, cd:2, flashT:0, introT:2.4, ai:0, minionT:0 };
}
function bossPhase2(e){
  e.phase = 2; e.flashT = 0.6;
  sfx('roar'); addShake(8, 0.5);
  banner = {txt:'FAS 2!', sub: e.bkind==='kung'?'Slemkungen reser sig i kunglig form!':'Bossen blir rasande!', t:2, color:'#ff5a4e'};
  if(e.bkind==='kung'){ e.maxhp = Math.round(e.maxhp*1.15); e.hp = e.maxhp; }
}
function summon(kinds){
  for(const k of kinds){
    const side = Math.random()<0.5;
    spawnQ.push({kind:k, delay:rnd(0.1,0.8), x: side? camX-40 : camX+VW+40, y: rnd(YMIN+10,YMAX-10)});
  }
}
function updBoss(e, dt){
  e.t += dt;
  e.flashT = Math.max(0, e.flashT-dt);
  if(e.introT>0){ e.introT -= dt; e.x -= 40*dt; return; }
  if(e.phase===1 && e.hp <= e.maxhp*0.5 && e.bkind!=='kung') bossPhase2(e);
  const t = nearestPlayer(e); if(!t) return;
  const rage = e.phase===2?1.5:1.15;
  e.face = t.x>e.x?1:-1;
  const B = e.bkind;
  if(e.state==='idle'){
    e.cd -= dt*rage;
    // följ långsamt mot spelaren
    const dx = t.x - e.x, dy = t.y - e.y;
    const spd = (B==='haxa'?70 : B==='kraken'?36 : 52)*rage;
    if(Math.abs(dx)>80) e.x += Math.sign(dx)*spd*dt;
    if(Math.abs(dy)>10) e.y += Math.sign(dy)*spd*0.6*dt;
    if(e.cd<=0){
      // välj attack
      e.ai = (e.ai+1)%4; e.state='windup'; e.t=0; sfx('warn');
      if(B==='pansar' && e.ai===2 && e.minionT<=0){ e.minionT = 16; summon(['grunt','grunt']); e.state='idle'; e.cd=1.2; }
      if(B==='kraken' && e.ai===2){ summon(players.length>2?['flyg','grunt']:['grunt']); e.state='idle'; e.cd=1.6; }
      if(B==='haxa' && e.ai===2){ summon(['flyg','flyg']); e.state='idle'; e.cd=1.8; }
      if(B==='kung' && e.phase===1 && e.ai===2){ summon(['grunt','grunt','snabb']); e.state='idle'; e.cd=1.8; }
      if(B==='robot' && e.ai===2 && e.phase===2 && e.minionT<=0){ e.minionT=20; summon(['robot']); e.state='idle'; e.cd=1.4; }
    }
  } else if(e.state==='windup'){
    const wd = (e.ai===1?0.8:0.6)/rage;
    if(e.t>=wd){
      e.state='atk'; e.t=0; e.hitDone=false;
      if(B==='pansar'){
        if(e.ai===1){ e.chargeV = e.face*520; sfx('dash'); }
        else sfx('swing');
      } else if(B==='kraken'){
        if(e.ai===1){
          // tentakler under spelarna
          sfx('blob');
          const tgts = players.filter(p=>p.state!=='down');
          const n = e.phase===2? Math.min(5,tgts.length+2) : Math.min(3,tgts.length+1);
          for(let i=0;i<n;i++){
            const tp = tgts[i%tgts.length];
            effects.push({kind:'tentacle', x:tp.x+rnd(-30,30), y:tp.y+rnd(-16,16), t:0, dur:1.0, warn:0.55, r:46, dmg:12});
          }
        } else {
          sfx('blob');
          for(let i=-1;i<=1;i++)
            projs.push({kind:'blob', x:e.x, y:e.y, z:40, vx:e.face*260+i*60, vy:i*40, vz:200, dmg:10, from:'e', t:0, hitIds:new Set()});
        }
      } else if(B==='robot'){
        if(e.ai===1){ e.vz = 520; sfx('jump'); }
        else if(e.ai===3){
          sfx('warn');
          for(let i=0;i<(e.phase===2?5:4);i++){
            const tp = players[i%players.length];
            effects.push({kind:'missile', x:tp.x+rnd(-50,50), y:clamp(tp.y+rnd(-30,30),YMIN,YMAX), t:0, dur:1.1, warn:0.75, r:60, dmg:11});
          }
        } else {
          sfx('laser');
          effects.push({kind:'beam', x:e.x+e.face*44, y:e.y, t:0, dur:0.3, face:e.face, dmg:11, big:true});
          e.cd = 0.3;
        }
      } else if(B==='haxa'){
        if(e.ai===1){
          sfx('fire');
          const tgts = players.filter(p=>p.state!=='down');
          const n = e.phase===2?5:3;
          for(let i=0;i<n;i++){
            const tp = tgts[i%tgts.length];
            effects.push({kind:'pillar', x:tp.x+rnd(-24,24), y:tp.y+rnd(-12,12), t:0, dur:1.2, warn:0.6, r:40, dmg:12});
          }
        } else if(e.ai===3){
          // teleportera nära en spelare
          burst(e.x, e.y, '#8a5ae0', 14, 120);
          e.x = t.x + (Math.random()<0.5?-1:1)*130; e.y = t.y;
          e.x = clamp(e.x, camX+60, camX+VW-60);
          burst(e.x, e.y, '#8a5ae0', 14, 120); sfx('dash');
          e.state='idle'; e.cd = 0.5;
        } else {
          sfx('blob');
          for(let i=0;i<3;i++)
            projs.push({kind:'blob', x:e.x, y:e.y, z:60, vx:e.face*(200+i*70), vy:rnd(-40,40), vz:120, dmg:10, from:'e', t:0, hitIds:new Set(), purple:true});
        }
      } else if(B==='kung'){
        if(e.phase===1){
          if(e.ai===1){ e.vz = 560; sfx('jump'); }
          else {
            sfx('blob');
            for(let i=0;i<5;i++)
              projs.push({kind:'blob', x:e.x, y:e.y, z:60, vx:e.face*(140+i*60)+rnd(-30,30), vy:rnd(-60,60), vz:220+i*20, dmg:10, from:'e', t:0, hitIds:new Set()});
          }
        } else {
          if(e.ai===1){
            sfx('laser');
            const lanes = [YMIN+20, (YMIN+YMAX)/2, YMAX-20];
            for(const ly of lanes)
              effects.push({kind:'kbeam', x:camX, y:ly, t:0, dur:1.1, warn:0.7, dmg:12});
          } else if(e.ai===3){ e.chargeV = e.face*480; sfx('dash'); }
          else {
            sfx('slam');
            effects.push({kind:'shock', x:e.x, y:e.y, t:0, dur:0.5, r:200, dmg:12, from:'e'});
            addShake(7,0.35);
            for(const p of players) if(Math.abs(p.x-e.x)<200 && Math.abs(p.y-e.y)<80 && p.z<30) damagePlayer(p, 12, e.x);
          }
        }
      }
    }
  } else if(e.state==='atk'){
    if(B==='pansar'){
      if(e.ai===1 && e.chargeV){
        e.x += e.chargeV*dt;
        for(const p of players) if(p.invT<=0 && Math.abs(p.x-e.x)<50 && Math.abs(p.y-e.y)<30) damagePlayer(p, 14, e.x-e.chargeV);
        if(e.t>0.7 || e.x<camX+60 || e.x>camX+VW-60){ e.chargeV=0; e.state='idle'; e.cd=rnd(1,1.8)/rage; }
      } else {
        if(e.t>0.15 && !e.hitDone){
          e.hitDone = true;
          for(const p of players) if(Math.abs(p.x-e.x)<110 && (p.x-e.x)*e.face>-20 && Math.abs(p.y-e.y)<34 && p.z<60) damagePlayer(p, 13, e.x);
        }
        if(e.t>0.5){ e.state='idle'; e.cd=rnd(0.8,1.5)/rage; }
      }
    } else if(B==='robot' && e.ai===1){
      e.vz -= GRAV*1.1*dt; e.z += e.vz*dt;
      if(e.z<=0 && e.vz<0){
        e.z=0; sfx('slam'); addShake(9,0.4);
        effects.push({kind:'shock', x:e.x, y:e.y, t:0, dur:0.5, r:999, dmg:0});
        for(const p of players) if(p.z<14 && p.state!=='down') damagePlayer(p, 12, e.x);
        ftext(e.x, e.y-140, 'HOPPA!', '#ffd23c', true);
        e.state='idle'; e.cd=rnd(1.2,2)/rage;
      }
    } else if(B==='kung' && e.phase===1 && e.ai===1){
      e.vz -= GRAV*0.9*dt; e.z += e.vz*dt;
      const tp = nearestPlayer(e);
      if(tp && e.z>30){ e.x += Math.sign(tp.x-e.x)*180*dt; e.y += Math.sign(tp.y-e.y)*120*dt; }
      if(e.z<=0 && e.vz<0){
        e.z=0; sfx('slam'); addShake(10,0.5);
        effects.push({kind:'shock', x:e.x, y:e.y, t:0, dur:0.5, r:150, dmg:0});
        for(const p of players) if(Math.abs(p.x-e.x)<150 && Math.abs(p.y-e.y)<70 && p.z<30) damagePlayer(p, 13, e.x);
        e.state='idle'; e.cd=rnd(1,1.7)/rage;
      }
    } else if(B==='kung' && e.phase===2 && e.ai===3 && e.chargeV){
      e.x += e.chargeV*dt;
      for(const p of players) if(p.invT<=0 && Math.abs(p.x-e.x)<60 && Math.abs(p.y-e.y)<40) damagePlayer(p, 13, e.x-e.chargeV);
      if(e.t>0.8 || e.x<camX+80 || e.x>camX+VW-80){ e.chargeV=0; e.state='idle'; e.cd=rnd(1,1.6)/rage; }
    } else {
      if(e.t>0.4){ e.state='idle'; e.cd = rnd(1.1,2)/rage; }
    }
  }
  e.minionT = Math.max(0, e.minionT-dt);
  if(B!=='kung' || e.phase===1){
    if(e.z===0 || B==='haxa') e.y = clamp(e.y, YMIN, YMAX);
  }
  e.x = clamp(e.x, camX+50, camX+VW-50);
}
function onBossDead(e){
  bossDone = true;
  sfx('explode'); sfx('fanfare');
  addShake(10, 0.6);
  hitstopT = 0.12;
  for(const en of [...enemies]) if(!en.boss) killEnemy(en, null);
  effects.push({kind:'explo', x:e.x, y:e.y, t:0, dur:0.8, r:130});
  for(let i=0;i<40;i++) parts.push({x:e.x+rnd(-60,60), y:e.y+rnd(-30,30), z:rnd(10,120), vx:rnd(-150,150), vy:rnd(-40,40), vz:rnd(50,250), life:rnd(0.5,1.3), color:pick(['#5ac83c','#7ee84a','#ffd23c','#fff']), size:rnd(2,5)});
  setTimeout(()=>{}, 0);
  clearT = 2.2; // liten paus innan resultatskärmen
}
// Slemkungen fas 1 → 2 hanteras i killEnemy-flödet via damageEnemy — specialfall:
const _origDamageEnemy = damageEnemy;
damageEnemy = function(e, dmg, src, kd){
  if(e.boss && e.bkind==='kung' && e.phase===1 && e.hp-dmg<=0){
    e.hp = 1; e.flashT = 0.5;
    bossPhase2(e);
    return;
  }
  _origDamageEnemy(e, dmg, src, kd);
};

// ===================== PROJEKTILER, EFFEKTER, PLOCK =====================
function updProjs(dt){
  for(const pr of projs){
    pr.t += dt;
    pr.x += (pr.vx||0)*dt; pr.y += (pr.vy||0)*dt;
    if(pr.kind==='blob'){ pr.vz -= GRAV*0.55*dt; pr.z += pr.vz*dt; }
    if(pr.from==='p'){
      for(const e of enemies){
        if(!pr.hitIds.has(e) && Math.abs(e.x-pr.x)<(e.boss?50:24) && Math.abs(e.y-pr.y)<26){
          pr.hitIds.add(e);
          damageEnemy(e, pr.dmg, pr.owner, pr.kind==='fist');
          if(pr.owner && pr.owner.ch){
            pr.owner.sp = Math.min(100, pr.owner.sp + (pr.kind==='star'?8:0));
            pr.owner.combo++; pr.owner.comboShow = 1.2;
          }
          if(pr.kind==='star'){ pr.dead = pr.hitIds.size>=2; }
          burst(pr.x, pr.y, '#ffd23c', 5, 80);
        }
      }
      for(const c of containers) if(!c.broken && Math.abs(c.x-pr.x)<22 && Math.abs(c.y-pr.y)<26) breakCont(c);
    } else {
      for(const p of players){
        if(p.invT<=0 && p.state!=='down' && Math.abs(p.x-pr.x)<20 && Math.abs(p.y-pr.y)<18 && Math.abs(p.z-(pr.z||0))<44){
          pr.dead = true; damagePlayer(p, pr.dmg, pr.x-Math.sign(pr.vx||1)*40);
        }
      }
      if(pr.kind==='blob' && pr.z<=0){ pr.dead = true; burst(pr.x, pr.y, pr.purple?'#8a5ae0':'#5ac83c', 5, 60); }
    }
    if(pr.life!==undefined && pr.t>pr.life) pr.dead = true;
    if(pr.x<camX-80 || pr.x>camX+VW+80) pr.dead = true;
  }
  projs = projs.filter(pr=>!pr.dead);
}
function updEffects(dt){
  for(const ef of effects){
    ef.t += dt;
    if(ef.kind==='tentacle'||ef.kind==='pillar'||ef.kind==='missile'){
      if(!ef.fired && ef.t>=ef.warn){
        ef.fired = true;
        sfx(ef.kind==='pillar'?'fire': ef.kind==='missile'?'explode':'blob');
        if(ef.kind==='missile') addShake(4,0.2);
        for(const p of players)
          if(p.invT<=0 && p.state!=='down' && Math.abs(p.x-ef.x)<ef.r && Math.abs(p.y-ef.y)<ef.r*0.6 && p.z<70)
            damagePlayer(p, ef.dmg, ef.x+10);
        burst(ef.x, ef.y, ef.kind==='pillar'?'#ff9a2a': ef.kind==='missile'?'#ff5a4e':'#3aa04a', 10, 120);
      }
    } else if(ef.kind==='beam'){
      if(ef.t<0.15){
        for(const p of players)
          if(p.invT<=0 && p.state!=='down' && Math.abs(p.y-ef.y)<16 && (p.x-ef.x)*ef.face>0 && p.z<36)
            damagePlayer(p, ef.dmg, ef.x);
      }
    } else if(ef.kind==='kbeam'){
      if(!ef.fired && ef.t>=ef.warn){
        ef.fired = true; sfx('laser');
        for(const p of players)
          if(p.invT<=0 && p.state!=='down' && Math.abs(p.y-ef.y)<26 && p.z<40)
            damagePlayer(p, ef.dmg, p.x-40);
      }
    }
  }
  effects = effects.filter(ef=>ef.t<ef.dur);
}
function updPickups(dt){
  for(const pk of pickups){
    pk.t += dt;
    if(pk.z>0){ pk.vz -= GRAV*0.6*dt; pk.z += pk.vz*dt; if(pk.z<=0){ pk.z=0; pk.vz = pk.vz<-60? -pk.vz*0.4 : 0; } }
    for(const p of players){
      if(p.state!=='down' && Math.abs(p.x-pk.x)<26 && Math.abs(p.y-pk.y)<20 && p.z<30){
        pk.dead = true;
        if(pk.kind==='mynt'){ p.score += 50; sfx('coin'); ftext(pk.x, pk.y-40, '+50', '#ffd23c'); }
        else if(pk.kind==='lask'){ p.hp = Math.min(p.maxhp, p.hp+15); sfx('food'); ftext(pk.x, pk.y-40, '+15 HP', '#7ee84a'); }
        else if(pk.kind==='kott'){ p.hp = Math.min(p.maxhp, p.hp+30); sfx('food'); ftext(pk.x, pk.y-40, '+30 HP', '#7ee84a'); }
        else if(pk.kind==='pizza'){ p.hp = Math.min(p.maxhp, p.hp+60); sfx('food'); ftext(pk.x, pk.y-40, 'PIZZA! +60', '#7ee84a', true); }
        else if(pk.kind==='stjarna'){ p.sp = Math.min(100, p.sp+50); sfx('heal'); ftext(pk.x, pk.y-40, 'SPECIAL +50%', '#5ae0e0'); }
        burst(pk.x, pk.y, '#fff', 5, 60);
        break;
      }
    }
    if(pk.t>14) pk.dead = true; // plock försvinner till slut
  }
  pickups = pickups.filter(pk=>!pk.dead);
}
function updParts(dt){
  for(const pa of parts){
    pa.life -= dt;
    pa.x += pa.vx*dt; pa.y += (pa.vy||0)*dt;
    pa.vz -= GRAV*0.5*dt; pa.z += pa.vz*dt;
    if(pa.z<0){ pa.z=0; pa.vz*=-0.4; }
  }
  parts = parts.filter(pa=>pa.life>0);
  for(const ft of ftexts) ft.t += dt;
  ftexts = ftexts.filter(ft=>ft.t<1.1);
}

// ===================== BANFLÖDE & KAMERA =====================
function startLevel(i){
  LI = i; camX = 0; waveIdx = 0; waveActive = false; goT = 0;
  bossObj = null; bossDone = false; clearT = 0;
  enemies = []; projs = []; pickups = []; parts = []; ftexts = []; effects = []; spawnQ = [];
  const L = LEVELS[i];
  containers = [];
  for(let x=500; x<L.len-600; x+=rnd(280,430)){
    containers.push({x, y:rnd(YMIN+8,YMAX-8), type:L.cont, broken:false});
  }
  players.forEach((p,idx)=>{
    p.x = 90+idx*50; p.y = YMIN+30+(idx%4)*40; p.z = 0;
    if(p.state==='down') reviveP(p, 0.5);
    p.hp = Math.min(p.maxhp, p.hp + Math.round(p.maxhp*0.4)); // vila mellan banor
    p.state='idle'; p.pose='idle';
  });
  banner = {txt:'BANA '+(i+1)+': '+L.name, sub:L.sub, t:3, color:'#ffd23c'};
  state = 'play';
  setSong(L.song);
}
function spawnWave(w){
  waveActive = true;
  const extra = players.length>=3 ? Math.ceil(players.length/2)-1 : 0;
  const ELITEKINDS = ['grunt','snabb','kastare','skold'];
  let n = 0;
  for(const [kind,count] of w.e){
    const cnt = Math.ceil(count*1.3) + (kind==='grunt'?extra:0);
    for(let i=0;i<cnt;i++){
      const side = (n%2===0);
      const elite = LI>=1 && ELITEKINDS.includes(kind) && Math.random() < 0.1 + LI*0.08;
      spawnQ.push({kind, elite, delay: n*0.35*Math.random()+i*0.18, x: side? camX+VW+40+rnd(0,60) : camX-40-rnd(0,60), y: rnd(YMIN+6, YMAX-6)});
      n++;
    }
  }
}
function updWaves(dt){
  for(const s of spawnQ){
    s.delay -= dt;
    if(s.delay<=0) enemies.push(mkEnemy(s.kind, s.x, s.y, s.elite));
  }
  spawnQ = spawnQ.filter(s=>s.delay>0);
  const L = LEVELS[LI];
  if(bossObj){
    if(bossDone && !enemies.length){
      clearT -= dt;
      if(clearT<=0){
        state = 'clear'; clearT = 6; setSong('win'); sfx('fanfare');
      }
    }
    return;
  }
  if(!waveActive){
    if(waveIdx < L.waves.length && camX >= L.waves[waveIdx].at - 10){
      spawnWave(L.waves[waveIdx]);
    } else if(waveIdx >= L.waves.length && camX >= L.len - VW - 10){
      // bossintro
      bossObj = mkBoss(L.boss, L.bossHp);
      enemies.push(bossObj);
      banner = {txt:'VARNING!', sub:L.bossName+' närmar sig!', t:2.5, color:'#ff5a4e'};
      sfx('roar');
      setSong(LI===4?'final':'boss');
      waveActive = true;
    }
  } else if(!enemies.length && !spawnQ.length){
    waveActive = false;
    if(waveIdx < L.waves.length) waveIdx++;
    goT = 4;
    sfx('go');
  }
  goT = Math.max(0, goT-dt);
}
function updCamera(dt){
  const alive = players.filter(p=>true);
  if(!alive.length) return;
  const L = LEVELS[LI];
  let lock;
  if(bossObj) lock = L.len - VW;
  else if(waveActive || spawnQ.length) lock = camX; // låst under våg
  else if(waveIdx < L.waves.length) lock = Math.min(L.waves[waveIdx].at, L.len - VW);
  else lock = L.len - VW;
  const target = Math.max(...alive.map(p=>p.x)) - VW*0.42;
  camX = clamp(Math.max(camX, target), 0, Math.max(0,lock));
  // knuffa med spelare som hamnar utanför vänsterkanten
  for(const p of players) p.x = Math.max(p.x, camX+16);
}

<script>
'use strict';
// ===================== RITNING AV VÄRLDEN =====================
function drawContainer(c){

  shadow(sx, sy, 14);
  if(c.type==='soptunna'){
    c.pal = '#7a828a';
    FR(sx-11, sy-30, 22, 30, '#5a626a');
    FR(sx-9, sy-28, 5, 26, '#7a828a');
    FR(sx-13, sy-34, 26, 6, '#8a929a');
    FR(sx-3, sy-38, 6, 5, '#5a626a');
  } else if(c.type==='tunna'){
    c.pal = '#8a6a3a';
    FR(sx-12, sy-32, 24, 32, '#6a4a24');
    FR(sx-10, sy-30, 6, 28, '#8a6a3a');
    FR(sx-12, sy-26, 24, 4, '#4a3418'); FR(sx-12, sy-12, 24, 4, '#4a3418');

    c.pal = '#a8845a';
    FR(sx-14, sy-28, 28, 28, '#8a6a42');

    ctx.strokeStyle = '#6a4e2e'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(sx-11,sy-25); ctx.lineTo(sx+11,sy-3); ctx.moveTo(sx+11,sy-25); ctx.lineTo(sx-11,sy-3); ctx.stroke();
  } else if(c.type==='kruka'){
    c.pal = '#b8683a';
    FP([[sx-12,sy-24],[sx+12,sy-24],[sx+8,sy],[sx-8,sy]], '#a05a30');
    FR(sx-13, sy-27, 26, 6, '#b8683a');
    FR(sx-2, sy-38, 4, 12, '#3a7a2a');
    FE(sx-5, sy-38, 5, 5, '#5ac83c'); FE(sx+5, sy-40, 6, 6, '#5ac83c');
  } else {
    c.pal = '#c8a03c';
    FR(sx-2, sy-34, 4, 34, '#c8a03c');
    FR(sx-14, sy-32, 28, 4, '#c8a03c'); FR(sx-14, sy-32, 3, 6, '#c8a03c'); FR(sx+11, sy-32, 3, 6, '#c8a03c');
    FR(sx-15, sy-40, 5, 9, '#f4f0e4'); FR(sx-2.5, sy-42, 5, 9, '#f4f0e4'); FR(sx+10, sy-40, 5, 9, '#f4f0e4');
    for(const [fx,fy] of [[-12.5,-42],[0,-44],[12.5,-42]]){
      const fl = 3+Math.sin(time*9+fx)*1.4;
      ctx.fillStyle = '#ff9a2a'; ctx.beginPath(); ctx.ellipse(sx+fx, sy+fy-fl/2, 3, fl, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffd88a'; ctx.beginPath(); ctx.ellipse(sx+fx, sy+fy-fl/2, 1.4, fl*0.5, 0, 0, Math.PI*2); ctx.fill();
    }
  }
}
function drawPickup(pk){
  const sx = pk.x-camX, sy = pk.y - pk.z;
  shadow(pk.x-camX, pk.y, 8);
  if(pk.kind==='mynt'){
    const w = Math.abs(Math.sin(pk.t*5))*7+2;
    FE(sx, sy-10, w, 9, '#c8a03c');
    FE(sx, sy-10, w*0.7, 6.5, '#ffd23c');
  } else if(pk.kind==='lask'){
    FR(sx-6, sy-20, 12, 18, '#5ae0e0');
    FR(sx-6, sy-14, 12, 5, '#e8f8f8');
    FR(sx-6, sy-22, 12, 3, '#8a929a');
  } else if(pk.kind==='kott'){
    FE(sx-3, sy-12, 9, 7, '#a05a30');
    FR(sx+4, sy-22, 4, 12, '#f4f0e4');
    FE(sx+6, sy-23, 4, 4, '#f4f0e4');
  } else if(pk.kind==='pizza'){
    FP([[sx-12,sy-22],[sx+12,sy-22],[sx,sy-2]], '#e8b84a');
    FR(sx-12, sy-24, 24, 4, '#c88a3a');
    FE(sx-4,sy-17,2.5,2.5,'#e0483a'); FE(sx+5,sy-16,2.5,2.5,'#e0483a'); FE(sx,sy-9,2.5,2.5,'#e0483a');
  } else if(pk.kind==='stjarna'){
    const r = 10+Math.sin(pk.t*6)*2;
    ctx.fillStyle = '#ffd23c';
    ctx.save(); ctx.translate(sx, sy-14); ctx.rotate(pk.t*2);
    ctx.beginPath();
    for(let i=0;i<10;i++){ const a = i*Math.PI/5, rr = i%2===0?r:r*0.45;
      ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr); }
    ctx.fill(); ctx.restore();
  }
}
function drawProjs(){
  for(const pr of projs){
    const sx = pr.x-camX, sy = pr.y-(pr.z||0);
    if(pr.kind==='blob'){
      shadow(pr.x-camX, pr.y, 7);
      if(pr.shu){ drawShuriken(sx, sy-6, 9, false); }
      else {
        ctx.fillStyle = pr.purple?'#8a5ae0':'#5ac83c';
        ctx.beginPath(); ctx.arc(sx, sy-6, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(sx-2, sy-9, 2.5, 0, Math.PI*2); ctx.fill();
      }
    } else if(pr.kind==='fist'){
      ctx.fillStyle = '#ff9a2a';
      for(let i=1;i<4;i++){ ctx.globalAlpha = 0.5-i*0.12; ctx.fillRect(sx-Math.sign(pr.vx)*i*14-9, sy-8, 18, 16); }
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#8a8a92'; ctx.fillRect(sx-10, sy-9, 20, 18);
      ctx.fillStyle = '#aab2ba'; ctx.fillRect(sx-7, sy-6, 14, 5);
      ctx.fillStyle = '#5ae0e0'; ctx.fillRect(sx-10, sy-9, 4, 18);
    } else if(pr.kind==='star'){
      ctx.fillStyle = '#ffd23c';
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(pr.t*14);
      ctx.fillRect(-7,-2,14,4); ctx.fillRect(-2,-7,4,14);
      ctx.restore();
    }
  }
}
function drawGroundFx(){
  for(const ef of effects){
    const sx = ef.x-camX;
    if(ef.kind==='shock'){
      const pr = ef.t/ef.dur, r = (ef.r===999?VW:ef.r)*pr;
      ctx.strokeStyle = 'rgba(255,210,60,'+(1-pr)+')'; ctx.lineWidth = 6*(1-pr)+2;
      ctx.beginPath(); ctx.ellipse(sx, ef.y, r, r*0.35, 0, 0, Math.PI*2); ctx.stroke();
    } else if(ef.kind==='explo'){
      const pr = ef.t/ef.dur;
      ctx.fillStyle = 'rgba(255,154,42,'+(0.8*(1-pr))+')';
      ctx.beginPath(); ctx.arc(sx, ef.y-20, ef.r*(0.4+pr*0.6), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,240,200,'+(0.8*(1-pr))+')';
      ctx.beginPath(); ctx.arc(sx, ef.y-20, ef.r*pr*0.5, 0, Math.PI*2); ctx.fill();
    } else if(ef.kind==='beam'){
      if(ef.t<0.16){
        const bw = ef.big?10:5;
        ctx.fillStyle = 'rgba(255,80,60,0.9)';
        if(ef.face>0) ctx.fillRect(sx, ef.y-26-bw/2, camX+VW-ef.x, bw);
        else ctx.fillRect(0, ef.y-26-bw/2, sx, bw);
        ctx.fillStyle = '#fff';
        if(ef.face>0) ctx.fillRect(sx, ef.y-26-1, camX+VW-ef.x, 2);
        else ctx.fillRect(0, ef.y-26-1, sx, 2);
      }
    } else if(ef.kind==='kbeam'){
      if(ef.t<ef.warn){
        const bl = Math.floor(ef.t*10)%2===0;
        if(bl){ ctx.fillStyle = 'rgba(255,210,60,0.35)'; ctx.fillRect(0, ef.y-30, VW, 20); }
      } else {
        ctx.fillStyle = 'rgba(255,210,60,0.85)'; ctx.fillRect(0, ef.y-34, VW, 28);
        ctx.fillStyle = '#fff'; ctx.fillRect(0, ef.y-24, VW, 8);
      }
    } else if(ef.kind==='tentacle'||ef.kind==='pillar'||ef.kind==='missile'){
      if(ef.t<ef.warn){
        const bl = Math.floor(ef.t*12)%2===0;
        ctx.strokeStyle = bl?'rgba(255,80,60,0.9)':'rgba(255,80,60,0.4)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.ellipse(sx, ef.y, ef.r*0.8, ef.r*0.3, 0, 0, Math.PI*2); ctx.stroke();
        if(ef.kind==='missile'){
          const dr = ef.t/ef.warn;
          ctx.fillStyle = '#5a626a'; ctx.fillRect(sx-5, ef.y-380+(dr*340)-(1-dr)*200, 10, 26);
          ctx.fillStyle = '#ff5a4e'; ctx.beginPath(); ctx.moveTo(sx-5, ef.y-354+(dr*340)-(1-dr)*200); ctx.lineTo(sx+5, ef.y-354+(dr*340)-(1-dr)*200); ctx.lineTo(sx, ef.y-344+(dr*340)-(1-dr)*200); ctx.fill();
        }
      } else {
        const pr = (ef.t-ef.warn)/(ef.dur-ef.warn);
        if(ef.kind==='tentacle'){
          const hh = 90*(pr<0.4? pr/0.4 : 1-(pr-0.4)/0.6);
          ctx.fillStyle = '#3aa04a';
          ctx.beginPath(); ctx.ellipse(sx, ef.y-hh/2, 12, hh/2+4, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#7ee84a'; ctx.beginPath(); ctx.arc(sx, ef.y-hh, 9, 0, Math.PI*2); ctx.fill();
        } else if(ef.kind==='pillar'){
          const hh = 130*(pr<0.3? pr/0.3 : 1-(pr-0.3)/0.7);
          for(let i=0;i<3;i++){
            ctx.fillStyle = ['#ff5a2a','#ff9a2a','#ffd88a'][i];
            ctx.beginPath(); ctx.ellipse(sx, ef.y-hh/2, 16-i*5, hh/2+6-i*4, 0, 0, Math.PI*2); ctx.fill();
          }
        } else {
          const rr = ef.r*(0.5+pr*0.5);
          ctx.fillStyle = 'rgba(255,154,42,'+(0.9*(1-pr))+')';
          ctx.beginPath(); ctx.arc(sx, ef.y-14, rr, 0, Math.PI*2); ctx.fill();
        }
      }
    }
  }
}
function drawParts(){
  for(const pa of parts){

    ctx.fillStyle = pa.color;

}
function drawFtexts(){

function drawScreens(){

function draw(){
  ctx.fillStyle = '#0a0812'; ctx.fillRect(0,0,VW,VH);

  ctx.save();
  if(shakeT>0) ctx.translate(rnd(-shakeA,shakeA), rnd(-shakeA,shakeA));
  drawBG(LEVELS[LI].bg, time);
  drawGroundFx();
  const list = [];
  for(const c of containers) if(!c.broken && c.x>camX-40 && c.x<camX+VW+40) list.push({y:c.y, f:(cc=>()=>drawContainer(cc))(c)});
  for(const pk of pickups) list.push({y:pk.y, f:(q=>()=>drawPickup(q))(pk)});
  for(const e of enemies) list.push({y:e.y, f:(q=>()=>q.boss?drawBoss(q):drawEnemy(q))(e)});
  for(const p of players) list.push({y:p.y, f:(q=>()=>drawPlayer(q))(p)});
  list.sort((a,b)=>a.y-b.y);
  for(const it of list) it.f();
  drawProjs();
  drawParts();
  drawFtexts();
  ctx.restore();
  drawHUD();
  drawScreens();
  syncQR();
}
function syncQR(){
  qrPanel.style.display = (NET.open && state==='lobby' && MODE!=='ctrl') ? 'block' : 'none';
}
