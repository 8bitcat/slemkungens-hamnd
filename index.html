// Uppföljare till Slemkungens Grotta. En enhet är värd (stor skärm), mobiler ansluter
// som handkontroller via PeerJS. All grafik ritas proceduralt, all musik är original.
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const VW = 960, VH = 540;

function fitCanvas(){
  const s = Math.min(window.innerWidth/VW, window.innerHeight/VH);
  cv.style.width = Math.floor(VW*s)+'px';
  cv.style.height = Math.floor(VH*s)+'px';
}
window.addEventListener('resize', fitCanvas); fitCanvas();
cv.focus();
cv.addEventListener('pointerdown', ()=>{ cv.focus(); initAudio(); });

const dist = (ax,ay,bx,by)=>Math.hypot(bx-ax, by-ay);
const clamp = (v,a,b)=>v<a?a:(v>b?b:v);
const lerp = (a,b,t)=>a+(b-a)*t;
const rnd = (a,b)=>a+Math.random()*(b-a);
const pick = arr=>arr[(Math.random()*arr.length)|0];

<script>
'use strict';
// ===================== LJUD =====================
let actx = null, sfxGain = null, musGain = null, musicOn = true, noiseBuf = null;
function initAudio(){
  if(actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    sfxGain = actx.createGain(); sfxGain.gain.value = 0.5; sfxGain.connect(actx.destination);
    musGain = actx.createGain(); musGain.gain.value = 0.3; musGain.connect(actx.destination);
    noiseBuf = actx.createBuffer(1, actx.sampleRate*0.1, actx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
    MUS.next = actx.currentTime + 0.1;
  }catch(e){}
}
const freq = n=>440*Math.pow(2,(n-69)/12);
function tone(f0,f1,dur,type,vol,when){
  if(!actx) return;
  const t = when!==undefined?when:actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(Math.max(f0,1),t);
  if(f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+dur+0.02);
}
function noiseSfx(dur,vol,hp){
  if(!actx) return;
  const n = actx.sampleRate*dur, buf = actx.createBuffer(1,n,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*(1-i/n);
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain(); g.gain.value = vol;
  if(hp){ const f = actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; src.connect(f); f.connect(g); }
  else src.connect(g);
  g.connect(sfxGain); src.start();
}
function sfx(name){
  if(!actx) return;
  const t = actx.currentTime;
  switch(name){
    case 'swing': noiseSfx(0.08,0.22,2000); break;
    case 'hit': tone(200,70,0.08,'square',0.26); noiseSfx(0.05,0.12,1200); break;
    case 'hit2': tone(160,50,0.12,'square',0.3); noiseSfx(0.08,0.16,800); break;
    case 'kick': tone(260,90,0.1,'square',0.26); noiseSfx(0.07,0.14,1000); break;
    case 'jump': tone(200,420,0.12,'square',0.14); break;
    case 'land': noiseSfx(0.06,0.12,400); break;
    case 'spin': noiseSfx(0.25,0.26,1200); tone(500,240,0.24,'square',0.16); break;
    case 'slam': tone(120,35,0.3,'sawtooth',0.4); noiseSfx(0.25,0.3,120); break;
    case 'dash': noiseSfx(0.14,0.24,2400); tone(800,200,0.14,'sawtooth',0.12); break;
    case 'rocket': tone(140,700,0.3,'sawtooth',0.24); noiseSfx(0.25,0.2,900); break;
    case 'star': tone(1100,700,0.09,'square',0.15); break;
    case 'heal': [76,80,83,88].forEach((n,i)=>tone(freq(n),freq(n),0.15,'triangle',0.2,t+i*0.07)); break;

  }
}

function N(tok){
  const m = tok.match(/^([A-G])([#b]?)(-?\d)$/); if(!m) return 0;
  const base = {C:0,D:2,E:4,F:5,G:7,A:9,B:11}[m[1]];
  return base + (m[2]==='#'?1:m[2]==='b'?-1:0) + (parseInt(m[3],10)+1)*12;
}
function parseSeq(s){
  const toks = s.trim().split(/\s+/);
  const out = new Array(toks.length).fill(null);
  for(let i=0;i<toks.length;i++){
    const tk = toks[i];
    if(tk==='.'||tk==='-') continue;
    let d = 1; for(let j=i+1;j<toks.length && toks[j]==='-';j++) d++;
    out[i] = {m:N(tk), d};
  }
  return out;
}
function mkSong(sd, lead, harm, bass, drums, vols){
  return { sd, len:64,
    tracks: [
      {notes:parseSeq(lead), wave:'square',   vol:(vols&&vols[0])||0.082},
      {notes:parseSeq(harm), wave:'square',   vol:(vols&&vols[1])||0.05},
      {notes:parseSeq(bass), wave:'triangle', vol:(vols&&vols[2])||0.17}
    ],
    drums: drums.replace(/\s/g,'') };
}

function updMusic(){

  const sg = MUS.song;

}

  }
}

      if(Math.abs(x)<0.25) x = 0; if(Math.abs(y)<0.25) y = 0;
      const aBtn = !!(gp.buttons[2]&&gp.buttons[2].pressed);
      const jBtn = !!(gp.buttons[0]&&gp.buttons[0].pressed);
      const sBtn = !!(gp.buttons[1]&&gp.buttons[1].pressed)||!!(gp.buttons[3]&&gp.buttons[3].pressed);
      out.push({id:'g'+i, x, y, aH:aBtn, jH:jBtn, sH:sBtn, aP:aBtn&&!prev.a, jP:jBtn&&!prev.j, sP:sBtn&&!prev.s});
      GPPREV[i] = {a:aBtn, j:jBtn, s:sBtn};
    }
  }catch(e){}
  return out;
}
let padCache = [];
function kbDir(){
  let x = 0, y = 0;
  if(KEY.ArrowLeft||KEY.KeyA) x -= 1;
  if(KEY.ArrowRight||KEY.KeyD) x += 1;
  if(KEY.ArrowUp||KEY.KeyW) y -= 1;
  if(KEY.ArrowDown||KEY.KeyS) y += 1;
  return {x,y};
}
function getInput(ctrlId){
  if(ctrlId==='kb'){
    const d = kbDir();
    const r = {x:d.x, y:d.y, aP:KLATCH.a, jP:KLATCH.j, sP:KLATCH.s, xE:KLATCH.x,
      aH:!!(KEY.KeyJ||KEY.KeyZ), jH:!!(KEY.KeyK||KEY.KeyX||KEY.Space), sH:!!(KEY.KeyL||KEY.KeyC)};
    KLATCH.a = KLATCH.j = KLATCH.s = false; KLATCH.x = 0;
    return r;
  }
  if(ctrlId==='t0'){
    const r = {x:TCTRL.x, y:TCTRL.y, aP:TCTRL.aL||false, jP:TCTRL.jL||false, sP:TCTRL.sL||false, aH:TCTRL.a, jH:TCTRL.j, sH:TCTRL.s};
    TCTRL.aL = TCTRL.jL = TCTRL.sL = false;
    return r;
  }
  if(ctrlId && ctrlId[0]==='g'){
    const gp = padCache.find(g=>g.id===ctrlId);
    return gp || {x:0,y:0,aP:false,jP:false,sP:false,aH:false,jH:false,sH:false};
  }
  const c = NET.ctrls[ctrlId];
  if(c && c.alive){
    const s = c.state;
    const r = {x:s.x, y:s.y, aP:s.aL||false, jP:s.jL||false, sP:s.sL||false, aH:s.a, jH:s.j, sH:s.s, xE:s.xL||0};
    s.aL = s.jL = s.sL = false; s.xL = 0;
    return r;
  }
  return {x:0,y:0,aP:false,jP:false,sP:false,aH:false,jH:false,sH:false};
}

// ===================== SPELARE =====================
function mkPlayer(ci, ctrlId, slot){
  const ch = CHARS[ci];
  return { id:slot, ctrlId, ch, ci,
    x: camX+120+slot*54, y: YMIN+30+(slot%4)*40, z:0, vz:0, vx:0, vy:0,

    face:1, pose:'idle', state:'idle', t:0, walk:0,
    atkN:0, atkT:0, comboT:0, atkHit:false, autoT:0,
    invT:0, hurtT:0, downT:0, spT:0, revP:0,

}
function startSpecial(p){
  p.sp = 0; p.state = 'special'; p.spT = 0; p.t = 0;
  sfx('special');
  const k = p.ch.key;
  if(k==='blixt'){ p.invT = 1.0; p.spinT = 0; sfx('spin'); }
  else if(k==='bull'){ p.invT = 1.2; p.vz = 380; p.z = Math.max(p.z, 1); }
  else if(k==='skuggan'){ p.invT = 0.7; sfx('dash'); p.dashHit = new Set(); }
  else if(k==='rex'){ sfx('rocket');
    projs.push({kind:'fist', x:p.x+p.face*30, y:p.y, z:26, vx:p.face*680, dmg:p.ch.spDmg, from:'p', owner:p, t:0, hitIds:new Set()}); }
  else if(k==='stella'){ sfx('heal');
    for(const q of players){
      if(q.state==='down' && Math.abs(q.x-p.x)<200 && Math.abs(q.y-p.y)<150){ reviveP(q, 0.45); }
      else if(q.state!=='down'){ q.hp = Math.min(q.maxhp, q.hp+30); burst(q.x, q.y, '#7ee84a', 8, 60); ftext(q.x, q.y-70, '+30', '#7ee84a'); }
    }
    for(const e of enemies){
      if(Math.abs(e.x-p.x)<150 && Math.abs(e.y-p.y)<110) damageEnemy(e, p.ch.spDmg, p, false);
    }
    for(let i=0;i<14;i++) parts.push({x:p.x+rnd(-100,100), y:p.y+rnd(-60,60), z:150+rnd(0,60), vx:0, vy:0, vz:-260, life:0.9, color:'#ffd23c', size:3, star:true});
  }
}
function updSpecial(p, dt){
  const k = p.ch.key;
  p.spT += dt;
  if(k==='blixt'){
    p.pose = 'spin';
    p.face = (Math.floor(p.spT*12)%2===0)?1:-1;
    const inp = getInput(p.ctrlId);
    p.x += inp.x*90*dt; p.y += inp.y*70*dt;
    if(!p.spinT || p.spT - p.spinT > 0.14){
      p.spinT = p.spT;
      for(const e of enemies){
        if(Math.abs(e.x-p.x)<74 && Math.abs(e.y-p.y)<40) damageEnemy(e, 6, p, p.spT>0.7);
      }
      parts.push({x:p.x+rnd(-30,30), y:p.y+rnd(-14,14), z:20+rnd(0,26), vx:rnd(-60,60), vy:0, vz:60, life:0.3, color:'#ffd23c', size:2});
    }
    if(p.spT>0.9){ p.state='idle'; p.pose='idle'; }
  } else if(k==='bull'){
    p.pose = p.z>0 ? 'slamup' : 'slam';
    p.vz -= GRAV*1.4*dt; p.z += p.vz*dt;
    if(p.z<=0 && p.vz<0){
      p.z = 0; p.state='idle';
      sfx('slam'); addShake(9, 0.4); hitstopT = Math.max(hitstopT, 0.05);
      effects.push({kind:'shock', x:p.x, y:p.y, t:0, dur:0.45, r:170});
      for(const e of enemies){
        if(Math.abs(e.x-p.x)<170 && Math.abs(e.y-p.y)<90 && e.z<40) damageEnemy(e, p.ch.spDmg, p, true);
      }
      burst(p.x, p.y, '#c8b89a', 14, 140);
    }
  } else if(k==='skuggan'){
    p.pose = 'dashpose';
    p.x += p.face*820*dt;
    p.trail.push({x:p.x, y:p.y, t:0.22});
    for(const e of enemies){
      if(!p.dashHit.has(e) && Math.abs(e.x-p.x)<40 && Math.abs(e.y-p.y)<34){
        p.dashHit.add(e); damageEnemy(e, p.ch.spDmg, p, true);
      }
    }
    if(p.spT>0.4){ p.state='idle'; }
  } else if(k==='rex'){
    p.pose = 'atk3';
    if(p.spT>0.45) p.state='idle';
  } else if(k==='stella'){
    p.pose = 'cast';
    if(p.spT>0.8) p.state='idle';
  }
  p.x = clamp(p.x, camX+16, camX+VW-16);
  p.y = clamp(p.y, YMIN, YMAX);
}
function reviveP(p, frac){
  p.state = 'idle'; p.pose = 'idle'; p.hp = Math.max(1, Math.round(p.maxhp*(frac||0.5)));
  p.invT = 1.5; p.revP = 0;
  sfx('revive'); burst(p.x, p.y, '#7ee84a', 12, 80);
  ftext(p.x, p.y-80, 'UPPE IGEN!', '#7ee84a', true);
}
function damagePlayer(p, dmg, srcX){
  if(p.invT>0 || p.state==='down' || p.state==='special' || state!=='play') return;
  p.hp -= dmg;
  p.combo = 0;
  sfx('hurt');
  burst(p.x, p.y, '#ff5a4e', 5, 60);
  addShake(3, 0.15);
  if(p.hp<=0){
    p.hp = 0; p.state = 'down'; p.pose = 'down'; p.downT = 9; p.invT = 1;
    sfx('down');
    ftext(p.x, p.y-80, p.ch.name+' ÄR NERE!', '#ff5a4e', true);
    if(nAlive()===0 && state==='play'){ state = 'over'; overT = 10; setSong('over'); }
  } else {
    p.state = 'hurt'; p.pose = 'hurt'; p.hurtT = 0.35; p.invT = 0.9;
    p.vx = (p.x<srcX?-1:1)*160;
  }
}
function doHit(p, dmg, kd, reach){
  let hit = false;
  const rx = reach||52;
  for(const e of enemies){
    const dx = e.x - p.x;
    if(dx*p.face > 6 && dx*p.face < rx && Math.abs(e.y-p.y) < 30 && Math.abs(e.z-p.z) < 56){
      damageEnemy(e, dmg, p, kd); hit = true;
    }
  }
  for(const c of containers){
    const dx = c.x - p.x;
    if(!c.broken && dx*p.face > 0 && dx*p.face < rx && Math.abs(c.y-p.y) < 30){ breakCont(c); hit = true; }
  }
  if(hit){
    p.sp = Math.min(100, p.sp + (p.ch.support?9:6));
    p.combo++; p.comboShow = 1.2;
    if(kd) { hitstopT = Math.max(hitstopT, 0.04); addShake(4,0.12); }
  }
  return hit;
}
function updPlayer(p, dt){
  p.t += dt;
  p.invT = Math.max(0, p.invT-dt);
  p.comboShow = Math.max(0, p.comboShow-dt);
  if(p.comboShow<=0) p.combo = 0;
  p.comboT = Math.max(0, p.comboT-dt);
  for(const tr of p.trail) tr.t -= dt;
  p.trail = p.trail.filter(tr=>tr.t>0);
  if(p.state==='down'){
    p.downT -= dt;
    // lagkamrat intill kan hjälpa upp — håll SLÅ
    let helper = null;
    for(const q of players){
      if(q!==p && q.state!=='down' && Math.abs(q.x-p.x)<56 && Math.abs(q.y-p.y)<44){
        const inp = q.lastInp;
        if(inp && (inp.aH||inp.aP)){ helper = q; break; }
      }
    }
    if(helper){
      p.revP += dt*(helper.ch.support?3:0.9);
      if(p.revP>=1) reviveP(p, helper.ch.support?0.6:0.5);
    } else p.revP = Math.max(0, p.revP-dt*0.5);
    if(p.downT<=0) reviveP(p, 0.4);
    return;
  }
  if(p.state==='hurt'){
    p.hurtT -= dt;
    p.x += p.vx*dt; p.vx *= (1-4*dt);
    if(p.hurtT<=0){ p.state='idle'; p.pose='idle'; }
    p.x = clamp(p.x, camX+16, camX+VW-16);
    return;
  }
  if(p.state==='special'){ updSpecial(p, dt); return; }
  const inp = getInput(p.ctrlId);
  p.lastInp = inp;
  if(p.state==='atk'){
    p.atkT += dt;
    const durs = [0.2, 0.2, 0.3];
    const dur = durs[p.atkN];
    p.x += p.face*30*dt;
    if(!p.atkHit && p.atkT > 0.08){
      p.atkHit = true;
      const kd = p.atkN===2 || p.jumpAtk;
      if(doHit(p, p.ch.dmg[p.atkN] + (p.jumpAtk?2:0), kd)) sfx(kd?'hit2':'hit');
    }
    if(inp.aP && p.atkT > dur*0.45 && p.atkN<2 && !p.jumpAtk) p.queued = true;
    if(p.z>0){ p.vz -= GRAV*dt; p.z += p.vz*dt; if(p.z<=0){ p.z=0; p.vz=0; } }
    if(p.atkT >= dur){
      if(p.queued){ p.queued=false; p.atkN++; p.atkT=0; p.atkHit=false; p.pose='atk'+(p.atkN+1); sfx('swing'); }
      else { p.state='idle'; p.pose='idle'; p.comboT=0.6; p.jumpAtk=false; }
    }
    return;
  }
  // rörelse
  const sp = p.ch.speed;
  p.x += inp.x*sp*dt; p.y += inp.y*sp*0.72*dt;
  if(inp.x!==0) p.face = inp.x>0?1:-1;
  const moving = inp.x!==0||inp.y!==0;
  // hopp
  if(p.z>0){
    p.vz -= GRAV*dt; p.z += p.vz*dt;
    if(p.z<=0){ p.z=0; p.vz=0; sfx('land'); parts.push({x:p.x,y:p.y,z:2,vx:-30,vy:0,vz:20,life:0.25,color:'#8a8692',size:2},{x:p.x,y:p.y,z:2,vx:30,vy:0,vz:20,life:0.25,color:'#8a8692',size:2}); }
    p.pose = 'air';
  } else p.pose = moving?'walk':'idle';
  if(inp.jP && p.z===0){ p.vz = JUMPV; p.z = 1; sfx('jump'); }
  if(moving && p.z===0) p.walk += dt*11;
  // attack (autorepeterar vid hållen knapp)
  p.autoT = inp.aH ? p.autoT+dt : 0;
  const wantAtk = inp.aP || (inp.aH && p.autoT>0.32);
  if(wantAtk){
    p.autoT = 0;
    if(p.ch.ranged && p.z===0){
      // Stella skjuter stjärnor
      p.state='atk'; p.atkN = p.comboT>0? Math.min(2,p.atkN+1):0; p.atkT=0; p.atkHit=true; p.pose='atk1';
      sfx('star');
      projs.push({kind:'star', x:p.x+p.face*22, y:p.y, z:30, vx:p.face*460, dmg:p.ch.dmg[p.atkN], from:'p', owner:p, t:0, life:0.65, hitIds:new Set()});
    } else if(p.z>0 && p.vz<200){
      p.state='atk'; p.atkN=2; p.atkT=0; p.atkHit=false; p.jumpAtk=true; p.pose='kick'; sfx('swing');
    } else if(p.z===0){
      p.atkN = p.comboT>0 ? Math.min(2, p.atkN+1) : 0;
      p.state='atk'; p.atkT=0; p.atkHit=false; p.queued=false; p.pose='atk'+(p.atkN+1); sfx('swing');
    }
  }
  // special
  if(inp.sP){
    if(p.sp>=100) startSpecial(p);
    else { sfx('nospecial'); ftext(p.x, p.y-76, 'Ladda specialmätaren!', '#8a86a0'); }
  }
  // Stella helar passivt vänner intill
  if(p.ch.support){
    for(const q of players) if(q!==p && q.state!=='down' && q.hp<q.maxhp && Math.abs(q.x-p.x)<90 && Math.abs(q.y-p.y)<70){
      q.hp = Math.min(q.maxhp, q.hp + 2.2*dt);
      if(Math.random()<dt*2) parts.push({x:q.x+rnd(-12,12), y:q.y, z:30+rnd(0,20), vx:0, vy:0, vz:40, life:0.5, color:'#7ee84a', size:2});
    }
  }
  p.x = clamp(p.x, camX+16, camX+VW-16);
  p.y = clamp(p.y, YMIN, YMAX);
}

// ===================== FIENDESKADA & DROPS =====================
function damageEnemy(e, dmg, src, kd){
  if(e.dead || (e.boss && e.introT>0)) return;
  // sköldslem blockerar framifrån (hoppattacker och specials går igenom)
  if(e.shield && !kd && src && src.z<20 && (src.x-e.x)*e.face<0 && e.state!=='hurt' && e.state!=='down'){
    e.hp -= dmg*0.15;
    sfx('hit'); ftext(e.x, e.y-50, 'BLOCK', '#aab2ba');
    e.x += e.face*-8;
    if(e.hp<=0) killEnemy(e, src);
    return;
  }
  e.hp -= dmg;
  e.flashT = 0.15;
  if(src && src.ch) { src.score += 10; }
  ftext(e.x+rnd(-8,8), e.y-(e.boss?110:46)-e.z, ''+Math.round(dmg), e.boss?'#ffd23c':'#fff');
  burst(e.x, e.y, e.boss?'#7ee84a':(ETYPES[e.kind]?ETYPES[e.kind].color:'#7ee84a'), 4, 70);
  if(e.hp<=0){ killEnemy(e, src); return; }
  if(e.boss){ if(Math.random()<0.15) sfx('bosshurt'); return; }
  if(kd){ e.state = 'down'; e.t = 0; e.downT = 1.1; e.z = Math.max(e.z, 2); e.vz = 160; e.x += (e.x<src.x?-1:1)*-14; }
  else if(!ETYPES[e.kind].big || Math.random()<0.4){ e.state = 'hurt'; e.t = 0.6; }
}
function killEnemy(e, src){
  if(e.dead) return;
  e.dead = true;
  sfx('splat');
  const col = e.boss? '#5ac83c' : ETYPES[e.kind].color;
  burst(e.x, e.y, col, e.boss?30:12, e.boss?200:110);
  if(src && src.ch){ src.score += e.boss? 2000 : ETYPES[e.kind].pts; src.kills++; }
  if(!e.boss && Math.random()<0.55) dropItem(e.x, e.y);
  enemies = enemies.filter(q=>q!==e);
  if(e.boss) onBossDead(e);
}
function dropItem(x, y, force){
  const r = Math.random();
  let kind = null;
  if(force) kind = force;
  else if(r<0.42) kind = 'mynt';
  else if(r<0.60) kind = 'lask';
  else if(r<0.72) kind = 'kott';
  else if(r<0.80) kind = 'pizza';
  else if(r<0.88) kind = 'stjarna';
  if(kind) pickups.push({kind, x:x+rnd(-10,10), y:clamp(y+rnd(-10,10),YMIN,YMAX), z:40, vz:120, t:0});
}
function breakCont(c){
  c.broken = true; sfx('break');
  burst(c.x, c.y, c.pal||'#8a8272', 10, 100);
  const r = Math.random();
  dropItem(c.x, c.y, r<0.35?'mynt': r<0.55?'lask': r<0.7?'kott': r<0.82?'pizza':'stjarna');
}

<script>
'use strict';
// ===================== FIENDER =====================
function mkEnemy(kind, x, y){

  const mult = 0.72 + 0.3*Math.max(1,players.length);
  return { kind, x, y, z: d.fly?46:0, vz:0, hp:Math.round(d.hp*mult), maxhp:Math.round(d.hp*mult),
    face:-1, state:'chase', t:0, bph:Math.random()*6, cd:rnd(0.3,1), flashT:0, downT:0,
    shield: d.shield, fly: d.fly };
}
function nearestPlayer(e){
  let best = null, bd = 1e9;
  for(const p of players){
    if(p.state==='down') continue;
    const d = Math.abs(p.x-e.x) + Math.abs(p.y-e.y)*1.5;
    if(d<bd){ bd = d; best = p; }
  }
  return best;
}
function updEnemy(e, dt){
  const d = ETYPES[e.kind];
  e.t += dt; e.bph += dt*(e.state==='chase'?7:3);
  e.flashT = Math.max(0, e.flashT-dt);
  if(e.state==='down'){
    e.vz -= GRAV*dt; e.z += e.vz*dt; if(e.z<0){ e.z=0; e.vz=0; }
    e.downT -= dt;
    if(e.downT<=0 && e.z===0){ e.state='chase'; e.cd = 0.4; }
    return;
  }
  if(e.state==='hurt'){ e.t -= dt*4; if(e.t<=0) e.state='chase'; return; }
  if(e.fly && e.state!=='atk') e.z = 40 + Math.sin(e.bph*0.8)*18;

    e.cd -= dt;
    let tx, ty = t.y;
    if(d.ranged||d.laser){ tx = t.x - e.face*230; if(Math.abs(e.x-t.x)<170) tx = e.x - e.face*60; }
    else tx = t.x - e.face*(d.big?46:34);
    const dx = tx-e.x, dy = ty-e.y;
    if(Math.abs(dx)>6) e.x += Math.sign(dx)*spd*dt;
    if(Math.abs(dy)>5) e.y += Math.sign(dy)*spd*0.7*dt;
    // separera fiender så de inte staplas
    for(const o of enemies) if(o!==e && !o.boss && Math.abs(o.x-e.x)<26 && Math.abs(o.y-e.y)<16){
      e.x += Math.sign(e.x-o.x || (Math.random()-0.5))*30*dt; e.y += Math.sign(e.y-o.y||1)*24*dt;
    }
    if(d.bomber){
      if(Math.abs(t.x-e.x)<56 && Math.abs(t.y-e.y)<30 && e.fuse===undefined){ e.fuse = 1.4; sfx('warn'); }
    } else if(d.laser){
      if(e.cd<=0 && Math.abs(t.y-e.y)<16 && Math.abs(t.x-e.x)<400){ e.state='windup'; e.t=0; sfx('warn'); }
    } else if(d.ranged){
      if(e.cd<=0 && Math.abs(t.x-e.x)>120){ e.state='windup'; e.t=0; }
    } else if(e.fly){
      if(e.cd<=0 && Math.abs(t.x-e.x)<160 && Math.abs(t.y-e.y)<40){ e.state='windup'; e.t=0; }
    } else {
      if(e.cd<=0 && Math.abs(t.x-e.x)<(d.big?62:50) && Math.abs(t.y-e.y)<20){ e.state='windup'; e.t=0; }
    }
  }
  if(e.fuse!==undefined){
    e.fuse -= dt;
    if(e.fuse<=0){
      sfx('explode'); addShake(6,0.3);
      effects.push({kind:'explo', x:e.x, y:e.y, t:0, dur:0.4, r:84});
      for(const p of players) if(Math.abs(p.x-e.x)<84 && Math.abs(p.y-e.y)<52) damagePlayer(p, d.dmg, e.x);
      burst(e.x, e.y, '#ff9a2a', 18, 180);
      enemies = enemies.filter(q=>q!==e);
      return;
    }
  }
  if(e.state==='windup'){
    const wdur = d.laser?0.7 : d.ranged?0.5 : e.fly?0.4 : 0.42;
    if(e.t>=wdur){
      e.state='atk'; e.t=0;
      if(d.laser){
        sfx('laser');
        effects.push({kind:'beam', x:e.x+e.face*18, y:e.y, t:0, dur:0.22, face:e.face, dmg:d.dmg});
      } else if(d.ranged){
        sfx('blob');
        const dx = t.x-e.x, fly = Math.abs(dx)/300;
        projs.push({kind:'blob', x:e.x, y:e.y, z:30, vx:Math.sign(dx)*300, vy:(t.y-e.y)/Math.max(0.3,fly), vz:150, dmg:d.dmg, from:'e', t:0, hitIds:new Set()});
      } else if(e.fly){
        e.swoopVx = Math.sign(t.x-e.x)*300; e.swoopVy = (t.y-e.y)*2;
      }
    }
  } else if(e.state==='atk'){
    if(e.fly){
      e.x += e.swoopVx*dt; e.y += e.swoopVy*dt;
      e.z = Math.max(8, e.z - 130*dt);
      for(const p of players) if(p.invT<=0 && Math.abs(p.x-e.x)<26 && Math.abs(p.y-e.y)<20 && e.z<44) damagePlayer(p, d.dmg, e.x);
      if(e.t>0.55){ e.state='chase'; e.cd = rnd(1.2,2); }
    } else if(!d.ranged && !d.laser){
      if(e.t>0.12 && !e.hitDone){
        e.hitDone = true;
        for(const p of players){
          if(Math.abs(p.x-e.x)<(d.big?66:52) && Math.abs(p.y-e.y)<24 && p.z<40) damagePlayer(p, d.dmg, e.x);
        }
      }
      if(e.t>0.3){ e.state='chase'; e.hitDone=false; e.cd = rnd(0.9,1.6); }
    } else if(e.t>0.3){ e.state='chase'; e.cd = d.laser?rnd(1.6,2.4):rnd(1.3,2); }
  }
  e.y = clamp(e.y, YMIN, YMAX);
  e.x = clamp(e.x, camX-60, camX+VW+60);
}

// ===================== BOSSAR =====================
function mkBoss(bkind, hp){
  const mult = 0.75 + 0.35*Math.max(1,players.length);
  return { boss:true, bkind, x: camX+VW-140, y: 430, z:0, vz:0,
    hp:Math.round(hp*mult), maxhp:Math.round(hp*mult), phase:1,
    face:-1, state:'idle', t:0, cd:2, flashT:0, introT:2.4, ai:0, minionT:0 };
}
function bossPhase2(e){
  e.phase = 2; e.flashT = 0.6;
  sfx('roar'); addShake(8, 0.5);
  banner = {txt:'FAS 2!', sub: e.bkind==='kung'?'Slemkungen reser sig i kunglig form!':'Bossen blir rasande!', t:2, color:'#ff5a4e'};
  if(e.bkind==='kung'){ e.maxhp = Math.round(e.maxhp*1.15); e.hp = e.maxhp; }
}
function summon(kinds){
  for(const k of kinds){
    const side = Math.random()<0.5;
    spawnQ.push({kind:k, delay:rnd(0.1,0.8), x: side? camX-40 : camX+VW+40, y: rnd(YMIN+10,YMAX-10)});
  }
}
function updBoss(e, dt){
  e.t += dt;
  e.flashT = Math.max(0, e.flashT-dt);
  if(e.introT>0){ e.introT -= dt; e.x -= 40*dt; return; }
  if(e.phase===1 && e.hp <= e.maxhp*0.5 && e.bkind!=='kung') bossPhase2(e);
  const t = nearestPlayer(e); if(!t) return;
  const rage = e.phase===2?1.35:1;
  e.face = t.x>e.x?1:-1;
  const B = e.bkind;
  if(e.state==='idle'){
    e.cd -= dt*rage;
    // följ långsamt mot spelaren
    const dx = t.x - e.x, dy = t.y - e.y;
    const spd = (B==='haxa'?70 : B==='kraken'?36 : 52)*rage;
    if(Math.abs(dx)>80) e.x += Math.sign(dx)*spd*dt;
    if(Math.abs(dy)>10) e.y += Math.sign(dy)*spd*0.6*dt;
    if(e.cd<=0){
      // välj attack
      e.ai = (e.ai+1)%4; e.state='windup'; e.t=0; sfx('warn');
      if(B==='pansar' && e.ai===2 && e.minionT<=0){ e.minionT = 16; summon(['grunt','grunt']); e.state='idle'; e.cd=1.2; }
      if(B==='kraken' && e.ai===2){ summon(players.length>2?['flyg','grunt']:['grunt']); e.state='idle'; e.cd=1.6; }
      if(B==='haxa' && e.ai===2){ summon(['flyg','flyg']); e.state='idle'; e.cd=1.8; }
      if(B==='kung' && e.phase===1 && e.ai===2){ summon(['grunt','grunt','snabb']); e.state='idle'; e.cd=1.8; }
      if(B==='robot' && e.ai===2 && e.phase===2 && e.minionT<=0){ e.minionT=20; summon(['robot']); e.state='idle'; e.cd=1.4; }
    }
  } else if(e.state==='windup'){
    const wd = (e.ai===1?0.8:0.6)/rage;
    if(e.t>=wd){
      e.state='atk'; e.t=0; e.hitDone=false;
      if(B==='pansar'){
        if(e.ai===1){ e.chargeV = e.face*520; sfx('dash'); }
        else sfx('swing');
      } else if(B==='kraken'){
        if(e.ai===1){
          // tentakler under spelarna
          sfx('blob');
          const tgts = players.filter(p=>p.state!=='down');
          const n = e.phase===2? Math.min(5,tgts.length+2) : Math.min(3,tgts.length+1);
          for(let i=0;i<n;i++){
            const tp = tgts[i%tgts.length];
            effects.push({kind:'tentacle', x:tp.x+rnd(-30,30), y:tp.y+rnd(-16,16), t:0, dur:1.0, warn:0.55, r:46, dmg:12});
          }
        } else {
          sfx('blob');
          for(let i=-1;i<=1;i++)
            projs.push({kind:'blob', x:e.x, y:e.y, z:40, vx:e.face*260+i*60, vy:i*40, vz:200, dmg:10, from:'e', t:0, hitIds:new Set()});
        }
      } else if(B==='robot'){
        if(e.ai===1){ e.vz = 520; sfx('jump'); }
        else if(e.ai===3){
          sfx('warn');
          for(let i=0;i<(e.phase===2?5:4);i++){
            const tp = players[i%players.length];
            effects.push({kind:'missile', x:tp.x+rnd(-50,50), y:clamp(tp.y+rnd(-30,30),YMIN,YMAX), t:0, dur:1.1, warn:0.75, r:60, dmg:11});
          }
        } else {
          sfx('laser');
          effects.push({kind:'beam', x:e.x+e.face*44, y:e.y, t:0, dur:0.3, face:e.face, dmg:11, big:true});
          e.cd = 0.3;
        }
      } else if(B==='haxa'){
        if(e.ai===1){
          sfx('fire');
          const tgts = players.filter(p=>p.state!=='down');
          const n = e.phase===2?5:3;
          for(let i=0;i<n;i++){
            const tp = tgts[i%tgts.length];
            effects.push({kind:'pillar', x:tp.x+rnd(-24,24), y:tp.y+rnd(-12,12), t:0, dur:1.2, warn:0.6, r:40, dmg:12});
          }
        } else if(e.ai===3){
          // teleportera nära en spelare
          burst(e.x, e.y, '#8a5ae0', 14, 120);
          e.x = t.x + (Math.random()<0.5?-1:1)*130; e.y = t.y;
          e.x = clamp(e.x, camX+60, camX+VW-60);
          burst(e.x, e.y, '#8a5ae0', 14, 120); sfx('dash');
          e.state='idle'; e.cd = 0.5;
        } else {
          sfx('blob');
          for(let i=0;i<3;i++)
            projs.push({kind:'blob', x:e.x, y:e.y, z:60, vx:e.face*(200+i*70), vy:rnd(-40,40), vz:120, dmg:10, from:'e', t:0, hitIds:new Set(), purple:true});
        }
      } else if(B==='kung'){
        if(e.phase===1){
          if(e.ai===1){ e.vz = 560; sfx('jump'); }
          else {
            sfx('blob');
            for(let i=0;i<5;i++)
              projs.push({kind:'blob', x:e.x, y:e.y, z:60, vx:e.face*(140+i*60)+rnd(-30,30), vy:rnd(-60,60), vz:220+i*20, dmg:10, from:'e', t:0, hitIds:new Set()});
          }
        } else {
          if(e.ai===1){
            sfx('laser');
            const lanes = [YMIN+20, (YMIN+YMAX)/2, YMAX-20];
            for(const ly of lanes)
              effects.push({kind:'kbeam', x:camX, y:ly, t:0, dur:1.1, warn:0.7, dmg:12});
          } else if(e.ai===3){ e.chargeV = e.face*480; sfx('dash'); }
          else {
            sfx('slam');
            effects.push({kind:'shock', x:e.x, y:e.y, t:0, dur:0.5, r:200, dmg:12, from:'e'});
            addShake(7,0.35);
            for(const p of players) if(Math.abs(p.x-e.x)<200 && Math.abs(p.y-e.y)<80 && p.z<30) damagePlayer(p, 12, e.x);
          }
        }
      }
    }
  } else if(e.state==='atk'){
    if(B==='pansar'){
      if(e.ai===1 && e.chargeV){
        e.x += e.chargeV*dt;
        for(const p of players) if(p.invT<=0 && Math.abs(p.x-e.x)<50 && Math.abs(p.y-e.y)<30) damagePlayer(p, 14, e.x-e.chargeV);
        if(e.t>0.7 || e.x<camX+60 || e.x>camX+VW-60){ e.chargeV=0; e.state='idle'; e.cd=rnd(1,1.8)/rage; }
      } else {
        if(e.t>0.15 && !e.hitDone){
          e.hitDone = true;
          for(const p of players) if(Math.abs(p.x-e.x)<110 && (p.x-e.x)*e.face>-20 && Math.abs(p.y-e.y)<34 && p.z<60) damagePlayer(p, 13, e.x);
        }
        if(e.t>0.5){ e.state='idle'; e.cd=rnd(0.8,1.5)/rage; }
      }
    } else if(B==='robot' && e.ai===1){
      e.vz -= GRAV*1.1*dt; e.z += e.vz*dt;
      if(e.z<=0 && e.vz<0){
        e.z=0; sfx('slam'); addShake(9,0.4);
        effects.push({kind:'shock', x:e.x, y:e.y, t:0, dur:0.5, r:999, dmg:0});
        for(const p of players) if(p.z<14 && p.state!=='down') damagePlayer(p, 12, e.x);
        ftext(e.x, e.y-140, 'HOPPA!', '#ffd23c', true);
        e.state='idle'; e.cd=rnd(1.2,2)/rage;
      }
    } else if(B==='kung' && e.phase===1 && e.ai===1){
      e.vz -= GRAV*0.9*dt; e.z += e.vz*dt;
      const tp = nearestPlayer(e);
      if(tp && e.z>30){ e.x += Math.sign(tp.x-e.x)*180*dt; e.y += Math.sign(tp.y-e.y)*120*dt; }
      if(e.z<=0 && e.vz<0){
        e.z=0; sfx('slam'); addShake(10,0.5);
        effects.push({kind:'shock', x:e.x, y:e.y, t:0, dur:0.5, r:150, dmg:0});
        for(const p of players) if(Math.abs(p.x-e.x)<150 && Math.abs(p.y-e.y)<70 && p.z<30) damagePlayer(p, 13, e.x);
        e.state='idle'; e.cd=rnd(1,1.7)/rage;
      }
    } else if(B==='kung' && e.phase===2 && e.ai===3 && e.chargeV){
      e.x += e.chargeV*dt;
      for(const p of players) if(p.invT<=0 && Math.abs(p.x-e.x)<60 && Math.abs(p.y-e.y)<40) damagePlayer(p, 13, e.x-e.chargeV);
      if(e.t>0.8 || e.x<camX+80 || e.x>camX+VW-80){ e.chargeV=0; e.state='idle'; e.cd=rnd(1,1.6)/rage; }
    } else {
      if(e.t>0.4){ e.state='idle'; e.cd = rnd(1.1,2)/rage; }
    }
  }
  e.minionT = Math.max(0, e.minionT-dt);
  if(B!=='kung' || e.phase===1){
    if(e.z===0 || B==='haxa') e.y = clamp(e.y, YMIN, YMAX);
  }
  e.x = clamp(e.x, camX+50, camX+VW-50);
}
function onBossDead(e){
  bossDone = true;
  sfx('explode'); sfx('fanfare');
  addShake(10, 0.6);
  hitstopT = 0.12;
  for(const en of [...enemies]) if(!en.boss) killEnemy(en, null);
  effects.push({kind:'explo', x:e.x, y:e.y, t:0, dur:0.8, r:130});
  for(let i=0;i<40;i++) parts.push({x:e.x+rnd(-60,60), y:e.y+rnd(-30,30), z:rnd(10,120), vx:rnd(-150,150), vy:rnd(-40,40), vz:rnd(50,250), life:rnd(0.5,1.3), color:pick(['#5ac83c','#7ee84a','#ffd23c','#fff']), size:rnd(2,5)});
  setTimeout(()=>{}, 0);
  clearT = 2.2; // liten paus innan resultatskärmen
}
// Slemkungen fas 1 → 2 hanteras i killEnemy-flödet via damageEnemy — specialfall:
const _origDamageEnemy = damageEnemy;
damageEnemy = function(e, dmg, src, kd){
  if(e.boss && e.bkind==='kung' && e.phase===1 && e.hp-dmg<=0){
    e.hp = 1; e.flashT = 0.5;
    bossPhase2(e);
    return;
  }
  _origDamageEnemy(e, dmg, src, kd);
};

// ===================== PROJEKTILER, EFFEKTER, PLOCK =====================
function updProjs(dt){
  for(const pr of projs){
    pr.t += dt;
    pr.x += (pr.vx||0)*dt; pr.y += (pr.vy||0)*dt;
    if(pr.kind==='blob'){ pr.vz -= GRAV*0.55*dt; pr.z += pr.vz*dt; }
    if(pr.from==='p'){
      for(const e of enemies){
        if(!pr.hitIds.has(e) && Math.abs(e.x-pr.x)<(e.boss?50:24) && Math.abs(e.y-pr.y)<26){
          pr.hitIds.add(e);
          damageEnemy(e, pr.dmg, pr.owner, pr.kind==='fist');
          if(pr.owner && pr.owner.ch){
            pr.owner.sp = Math.min(100, pr.owner.sp + (pr.kind==='star'?8:0));
            pr.owner.combo++; pr.owner.comboShow = 1.2;
          }
          if(pr.kind==='star'){ pr.dead = pr.hitIds.size>=2; }
          burst(pr.x, pr.y, '#ffd23c', 5, 80);
        }
      }
      for(const c of containers) if(!c.broken && Math.abs(c.x-pr.x)<22 && Math.abs(c.y-pr.y)<26) breakCont(c);
    } else {
      for(const p of players){
        if(p.invT<=0 && p.state!=='down' && Math.abs(p.x-pr.x)<20 && Math.abs(p.y-pr.y)<18 && Math.abs(p.z-(pr.z||0))<44){
          pr.dead = true; damagePlayer(p, pr.dmg, pr.x-Math.sign(pr.vx||1)*40);
        }
      }
      if(pr.kind==='blob' && pr.z<=0){ pr.dead = true; burst(pr.x, pr.y, pr.purple?'#8a5ae0':'#5ac83c', 5, 60); }
    }
    if(pr.life!==undefined && pr.t>pr.life) pr.dead = true;
    if(pr.x<camX-80 || pr.x>camX+VW+80) pr.dead = true;
  }
  projs = projs.filter(pr=>!pr.dead);
}
function updEffects(dt){
  for(const ef of effects){
    ef.t += dt;
    if(ef.kind==='tentacle'||ef.kind==='pillar'||ef.kind==='missile'){
      if(!ef.fired && ef.t>=ef.warn){
        ef.fired = true;
        sfx(ef.kind==='pillar'?'fire': ef.kind==='missile'?'explode':'blob');
        if(ef.kind==='missile') addShake(4,0.2);
        for(const p of players)
          if(p.invT<=0 && p.state!=='down' && Math.abs(p.x-ef.x)<ef.r && Math.abs(p.y-ef.y)<ef.r*0.6 && p.z<70)
            damagePlayer(p, ef.dmg, ef.x+10);
        burst(ef.x, ef.y, ef.kind==='pillar'?'#ff9a2a': ef.kind==='missile'?'#ff5a4e':'#3aa04a', 10, 120);
      }
    } else if(ef.kind==='beam'){
      if(ef.t<0.15){
        for(const p of players)
          if(p.invT<=0 && p.state!=='down' && Math.abs(p.y-ef.y)<16 && (p.x-ef.x)*ef.face>0 && p.z<36)
            damagePlayer(p, ef.dmg, ef.x);
      }
    } else if(ef.kind==='kbeam'){
      if(!ef.fired && ef.t>=ef.warn){
        ef.fired = true; sfx('laser');
        for(const p of players)
          if(p.invT<=0 && p.state!=='down' && Math.abs(p.y-ef.y)<26 && p.z<40)
            damagePlayer(p, ef.dmg, p.x-40);
      }
    }
  }
  effects = effects.filter(ef=>ef.t<ef.dur);
}
function updPickups(dt){
  for(const pk of pickups){
    pk.t += dt;
    if(pk.z>0){ pk.vz -= GRAV*0.6*dt; pk.z += pk.vz*dt; if(pk.z<=0){ pk.z=0; pk.vz = pk.vz<-60? -pk.vz*0.4 : 0; } }
    for(const p of players){
      if(p.state!=='down' && Math.abs(p.x-pk.x)<26 && Math.abs(p.y-pk.y)<20 && p.z<30){
        pk.dead = true;
        if(pk.kind==='mynt'){ p.score += 50; sfx('coin'); ftext(pk.x, pk.y-40, '+50', '#ffd23c'); }
        else if(pk.kind==='lask'){ p.hp = Math.min(p.maxhp, p.hp+15); sfx('food'); ftext(pk.x, pk.y-40, '+15 HP', '#7ee84a'); }
        else if(pk.kind==='kott'){ p.hp = Math.min(p.maxhp, p.hp+30); sfx('food'); ftext(pk.x, pk.y-40, '+30 HP', '#7ee84a'); }
        else if(pk.kind==='pizza'){ p.hp = Math.min(p.maxhp, p.hp+60); sfx('food'); ftext(pk.x, pk.y-40, 'PIZZA! +60', '#7ee84a', true); }
        else if(pk.kind==='stjarna'){ p.sp = Math.min(100, p.sp+50); sfx('heal'); ftext(pk.x, pk.y-40, 'SPECIAL +50%', '#5ae0e0'); }
        burst(pk.x, pk.y, '#fff', 5, 60);
        break;
      }
    }
    if(pk.t>14) pk.dead = true; // plock försvinner till slut
  }
  pickups = pickups.filter(pk=>!pk.dead);
}
function updParts(dt){
  for(const pa of parts){
    pa.life -= dt;
    pa.x += pa.vx*dt; pa.y += (pa.vy||0)*dt;
    pa.vz -= GRAV*0.5*dt; pa.z += pa.vz*dt;
    if(pa.z<0){ pa.z=0; pa.vz*=-0.4; }
  }
  parts = parts.filter(pa=>pa.life>0);
  for(const ft of ftexts) ft.t += dt;
  ftexts = ftexts.filter(ft=>ft.t<1.1);
}

// ===================== BANFLÖDE & KAMERA =====================
function startLevel(i){
  LI = i; camX = 0; waveIdx = 0; waveActive = false; goT = 0;
  bossObj = null; bossDone = false; clearT = 0;
  enemies = []; projs = []; pickups = []; parts = []; ftexts = []; effects = []; spawnQ = [];
  const L = LEVELS[i];
  containers = [];
  for(let x=500; x<L.len-600; x+=rnd(280,430)){
    containers.push({x, y:rnd(YMIN+8,YMAX-8), type:L.cont, broken:false});
  }
  players.forEach((p,idx)=>{
    p.x = 90+idx*50; p.y = YMIN+30+(idx%4)*40; p.z = 0;
    if(p.state==='down') reviveP(p, 0.5);
    p.hp = Math.min(p.maxhp, p.hp + Math.round(p.maxhp*0.4)); // vila mellan banor
    p.state='idle'; p.pose='idle';
  });
  banner = {txt:'BANA '+(i+1)+': '+L.name, sub:L.sub, t:3, color:'#ffd23c'};
  state = 'play';
  setSong(L.song);
}
function spawnWave(w){
  waveActive = true;
  const extra = players.length>=3 ? Math.ceil(players.length/2)-1 : 0;
  let n = 0;
  for(const [kind,count] of w.e){
    for(let i=0;i<count+(kind==='grunt'?extra:0);i++){
      const side = (n%2===0);
      spawnQ.push({kind, delay: n*0.4*Math.random()+i*0.2, x: side? camX+VW+40+rnd(0,60) : camX-40-rnd(0,60), y: rnd(YMIN+6, YMAX-6)});
      n++;
    }
  }
}
function updWaves(dt){
  for(const s of spawnQ){
    s.delay -= dt;
    if(s.delay<=0) enemies.push(Object.assign(mkEnemy(s.kind, s.x, s.y)));
  }
  spawnQ = spawnQ.filter(s=>s.delay>0);
  const L = LEVELS[LI];
  if(bossObj){
    if(bossDone && !enemies.length){
      clearT -= dt;
      if(clearT<=0){
        state = 'clear'; clearT = 6; setSong('win'); sfx('fanfare');
      }
    }
    return;
  }
  if(!waveActive){
    if(waveIdx < L.waves.length && camX >= L.waves[waveIdx].at - 10){
      spawnWave(L.waves[waveIdx]);
    } else if(waveIdx >= L.waves.length && camX >= L.len - VW - 10){
      // bossintro
      bossObj = mkBoss(L.boss, L.bossHp);
      enemies.push(bossObj);
      banner = {txt:'VARNING!', sub:L.bossName+' närmar sig!', t:2.5, color:'#ff5a4e'};
      sfx('roar');
      setSong(LI===4?'final':'boss');
      waveActive = true;
    }
  } else if(!enemies.length && !spawnQ.length){
    waveActive = false;
    if(waveIdx < L.waves.length) waveIdx++;
    goT = 4;
    sfx('go');
  }
  goT = Math.max(0, goT-dt);
}
function updCamera(dt){
  const alive = players.filter(p=>true);
  if(!alive.length) return;
  const L = LEVELS[LI];
  let lock;
  if(bossObj) lock = L.len - VW;
  else if(waveActive || spawnQ.length) lock = camX; // låst under våg
  else if(waveIdx < L.waves.length) lock = Math.min(L.waves[waveIdx].at, L.len - VW);
  else lock = L.len - VW;
  const target = Math.max(...alive.map(p=>p.x)) - VW*0.42;
  camX = clamp(Math.max(camX, target), 0, Math.max(0,lock));
  // knuffa med spelare som hamnar utanför vänsterkanten
  for(const p of players) p.x = Math.max(p.x, camX+16);
}

        if(ef.kind==='tentacle'){

<script>
'use strict';
// ===================== LOBBY & SPELSTATER =====================
function ensureJoiner(ctrlId){
  if(joiners.some(j=>j.ctrlId===ctrlId) || players.some(p=>p.ctrlId===ctrlId)) return null;
  const jr = {ctrlId, ci:joiners.length%CHARS.length, ready:false, px:0, fresh:true};
  joiners.push(jr); sfx('select');
  return jr;
}
function scanNewCtrls(){
  for(const id of netCtrlIds()) ensureJoiner(id);
  if(KLATCH.a && !joiners.some(j=>j.ctrlId==='kb') && !players.some(p=>p.ctrlId==='kb')){
    KLATCH.a = false; ensureJoiner('kb');
  }
  if(LOCALPAD && TCTRL.aL && !joiners.some(j=>j.ctrlId==='t0') && !players.some(p=>p.ctrlId==='t0')){
    TCTRL.aL = false; ensureJoiner('t0');
  }
  for(const gp of padCache) if(gp.aP) ensureJoiner(gp.id);
  // släpp joiners vars mobil tappat anslutningen
  joiners = joiners.filter(j=> j.ctrlId[0]!=='n' || (NET.ctrls[j.ctrlId] && NET.ctrls[j.ctrlId].alive));
}
function updJoinerSelect(jr, inPlay){
  const inp = getInput(jr.ctrlId);
  let step = 0;
  if(inp.xE) step = inp.xE>0?1:-1;
  else { if(inp.x>0.5 && jr.px<=0.5) step = 1; if(inp.x<-0.5 && jr.px>=-0.5) step = -1; }
  jr.px = inp.x;
  if(!jr.ready && step){ jr.ci = (jr.ci+step+CHARS.length)%CHARS.length; sfx('select'); }
  if(inp.aP){
    if(inPlay){
      const p = mkPlayer(jr.ci, jr.ctrlId, players.length);
      p.x = camX+80; p.y = YMIN+60; p.invT = 2;
      players.push(p);
      joiners = joiners.filter(q=>q!==jr);
      ftext(p.x, p.y-80, p.ch.name+' HOPPAR IN!', p.ch.color, true);
      sfx('ready');
      return;
    }
    jr.ready = !jr.ready; sfx('ready');
  }
  if(inp.jP && !inPlay) jr.ready = false;
}
function updLobby(dt){
  setSong('lobby');
  scanNewCtrls();
  for(const jr of joiners){
    if(jr.fresh){ jr.fresh = false; continue; }
    updJoinerSelect(jr, false);
  }
  if(joiners.length>0 && joiners.every(j=>j.ready)){
    if(startT<0) startT = 3.5;
    startT -= dt;
    if(startT<=0){
      players = joiners.map((j,i)=>mkPlayer(j.ci, j.ctrlId, i));
      joiners = []; startT = -1;
      sfx('fanfare');
      startLevel(0);
    }
  } else startT = -1;
}
function anyAttack(){
  let hit = false;
  for(const p of players){ if(getInput(p.ctrlId).aP) hit = true; }
  return hit;
}
function resetToLobby(){
  players = []; joiners = []; enemies = []; projs = []; pickups = []; parts = []; effects = []; spawnQ = []; containers = [];
  bossObj = null; bossDone = false; state = 'lobby'; camX = 0; paused = false; banner = null;
  setSong('lobby');
}
function updClear(dt){
  clearT -= dt;
  updParts(dt);
  if(clearT<=0){
    if(LI < LEVELS.length-1) startLevel(LI+1);
    else { state = 'victory'; victT = 0; setSong('win'); }
  }
}
function updOver(dt){
  overT -= dt;
  if(anyAttack()){
    for(const p of players){ p.state='idle'; p.pose='idle'; p.hp = p.maxhp; p.invT = 2; p.downT = 0; }
    enemies = enemies.filter(e=>e.boss);
    projs = []; effects = []; spawnQ = spawnQ.filter(s=>false);
    if(!bossObj && !enemies.length && waveIdx < LEVELS[LI].waves.length) waveActive = false;
    state = 'play';
    setSong(bossObj ? (LI===4?'final':'boss') : LEVELS[LI].song);
    sfx('revive');
    return;
  }
  if(overT<=0) resetToLobby();
}
function updVict(dt){
  victT += dt;
  updParts(dt);
  if(Math.random()<dt*14)
    parts.push({x:camX+rnd(0,VW), y:rnd(YMIN,YMAX), z:rnd(340,420), vx:rnd(-30,30), vy:0, vz:-30,
      life:rnd(1.5,3), color:pick(['#ffd23c','#7ee84a','#ff8ad0','#5ae0e0','#ff9a2a']), size:4});
  if(victT>3 && anyAttack()) resetToLobby();
}
// extra ritning: drop-in-väljare under pågående spel
const _draw0 = draw;
draw = function(){
  _draw0();
  if(state==='play' && joiners.length){
    joiners.forEach((jr,i)=>{
      const y = VH-58-i*30, c = CHARS[jr.ci];
      ctx.fillStyle = 'rgba(10,8,18,0.85)'; ctx.fillRect(8, y-14, 330, 27);
      ctx.strokeStyle = c.color; ctx.lineWidth = 2; ctx.strokeRect(8, y-14, 330, 27);
      otext('NY SPELARE: ←→ välj', 90, y, 11, '#f4f0e4');
      otext(c.name, 205, y, 12, c.color);
      otext('SLÅ = hoppa in!', 285, y, 10, '#ffd23c');
    });
  }
};

// ===================== HUVUD-UPPDATERING =====================
function update(dt){
  time += dt;
  padCache = pollPads();
  updMusic();
  if(state==='lobby'){ updLobby(dt); pushStatus(); return; }
  if(state==='clear'){ updClear(dt); pushStatus(); return; }
  if(state==='over'){ updOver(dt); pushStatus(); return; }
  if(state==='victory'){ updVict(dt); pushStatus(); return; }
  // spel
  if(paused){ pushStatus(); return; }
  if(hitstopT>0){ hitstopT -= dt; return; }
  shakeT = Math.max(0, shakeT-dt); if(shakeT<=0) shakeA = 0;
  if(banner) banner.t -= dt;
  scanNewCtrls();
  for(const jr of joiners){ if(jr.fresh){ jr.fresh=false; continue; } updJoinerSelect(jr, true); }
  updWaves(dt);
  updCamera(dt);
  for(const p of players) updPlayer(p, dt);
  for(const e of [...enemies]) e.boss? updBoss(e, dt) : updEnemy(e, dt);
  updProjs(dt);
  updEffects(dt);
  updPickups(dt);
  updParts(dt);
  pushStatus();
}

// ===================== NÄTVERK (mobiler som handkontroller) =====================
const URLQ = new URLSearchParams(location.search);
const HASPEER = typeof window.Peer !== 'undefined';
const IS_TOUCH = 'ontouchstart' in window;
let MODE = 'host';
if(URLQ.get('room')) MODE = 'ctrl';
else if(HASPEER && IS_TOUCH && Math.min(window.innerWidth, window.innerHeight) < 620) MODE = 'choose';
const NET = { mode:'none', peer:null, ctrls:{}, code:'', open:false, nextIdx:0, lastPush:0 };
function netCtrlIds(){ return Object.keys(NET.ctrls).filter(id=>NET.ctrls[id].alive); }
function makeCode(){ const A='abcdefghjkmnpqrstuvwxyz23456789'; let s=''; for(let i=0;i<4;i++) s+=A[(Math.random()*A.length)|0]; return s; }
const PUBLIC_URL = 'https://8bitcat.github.io/slemkungens-hamnd/';
// STUN + TURN-relä: krävs när direktkoppling blockeras (client isolation,
// mobildata eller VPN-adaptrar på värddatorn)
const ICE_OPTS = { config: { iceServers: [
  { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] },
  { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
] } };
function startHost(){
  if(!HASPEER || NET.mode==='host') return;
  NET.mode = 'host';
  let tries = 0;
  const attempt = ()=>{
    NET.code = makeCode();
    const peer = new Peer('slemhamnd-'+NET.code, ICE_OPTS);
    NET.peer = peer;
    peer.on('open', ()=>{ NET.open = true; updateQR(); });
    peer.on('disconnected', ()=>{ try{ peer.reconnect(); }catch(e){} });
    peer.on('error', err=>{
      if(err && err.type==='unavailable-id' && tries++ < 5){ try{ peer.destroy(); }catch(e){} attempt(); }
    });
    peer.on('connection', conn=>{
      conn.on('open', ()=>{
        const allIds = [...joiners.map(j=>j.ctrlId), ...players.map(p=>p.ctrlId)];
        let id = allIds.find(cid=>cid && cid[0]==='n' && (!NET.ctrls[cid] || !NET.ctrls[cid].alive));
        if(!id) id = 'n'+(NET.nextIdx++);
        NET.ctrls[id] = { conn, alive:true, state:{x:0,y:0,a:false,j:false,s:false} };
        conn.on('data', d=>{
          if(d && d.t==='i' && NET.ctrls[id]){
            const s = NET.ctrls[id].state;
            const nx = +d.x||0, ny = +d.y||0, na = !!d.a, nj = !!d.j, ns = !!d.s;
            // latcha snabba tryck så de aldrig faller mellan två bildrutor
            if(na && !s.a) s.aL = true;
            if(nj && !s.j) s.jL = true;
            if(ns && !s.s) s.sL = true;
            if(nx!==0 && s.x===0) s.xL = nx;
            s.x = nx; s.y = ny; s.a = na; s.j = nj; s.s = ns;
          }
        });
        const drop = ()=>{ if(NET.ctrls[id] && NET.ctrls[id].conn===conn){ NET.ctrls[id].alive = false; NET.ctrls[id].state = {x:0,y:0,a:false,j:false,s:false}; } };
        conn.on('close', drop); conn.on('error', drop);
      });
    });
  };
  attempt();
}
function netSend(id, msg){ const c = NET.ctrls[id]; if(c && c.alive){ try{ c.conn.send(msg); }catch(e){} } }
function pushStatus(){
  if(NET.mode!=='host') return;
  if(time - NET.lastPush < 0.3) return;
  NET.lastPush = time;
  for(const id of netCtrlIds()){
    let msg = { t:'you', st:'lobby' };
    const ji = joiners.findIndex(j=>j.ctrlId===id);
    if(ji>=0){
      const jr = joiners[ji], c = CHARS[jr.ci];
      msg = { t:'you', st:'select', n:ji+1, color:c.color, cls:c.name, ready:jr.ready, inPlay:state==='play' };
    } else {
      const p = players.find(q=>q.ctrlId===id);
      if(p) msg = { t:'you', st:state, n:p.id+1, color:p.ch.color, cls:p.ch.name,
        hp:Math.max(0,Math.round(p.hp)), maxhp:p.maxhp, sp:Math.round(p.sp), downed:p.state==='down', score:p.score };
    }
    netSend(id, msg);
  }
}
const qrPanel = document.getElementById('qrPanel');
function joinLink(){
  const base = location.hostname==='8bitcat.github.io'
    ? location.origin + location.pathname
    : PUBLIC_URL;
  return base + '?room=' + NET.code;
}
function updateQR(){
  if(!NET.open) return;
  qrPanel.innerHTML = '<img width="150" height="150" alt="QR" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=0a0812&bgcolor=f4f0e4&data='+encodeURIComponent(joinLink())+'">'
    + '<div style="margin-top:6px;font-size:12px">Skanna med mobilkameran</div>'
    + '<div style="font-size:16px;font-weight:bold;color:#5ae0e0;margin-top:2px">'+NET.code.toUpperCase()+'</div>';
}

// ===================== MOBILKONTROLLER =====================
function bindPadControls(st, send){
  const zone = document.getElementById('stickZone');
  const base = document.getElementById('stickBase'), knob = document.getElementById('stickKnob');
  const hint = document.getElementById('stickHint');
  let sid = null, ox = 0, oy = 0;
  const place = (el,x,y,sz)=>{ el.style.left = (x-sz/2)+'px'; el.style.top = (y-sz/2)+'px'; };
  zone.addEventListener('pointerdown', e=>{
    if(sid!==null) return;
    sid = e.pointerId;
    try{ zone.setPointerCapture(sid); }catch(err){}
    const r = zone.getBoundingClientRect();
    ox = e.clientX-r.left; oy = e.clientY-r.top;
    hint.style.display = 'none';
    base.style.display = 'block'; knob.style.display = 'block';
    place(base,ox,oy,120); place(knob,ox,oy,56);
  });
  zone.addEventListener('pointermove', e=>{
    if(e.pointerId!==sid) return;
    const r = zone.getBoundingClientRect();
    let dx = e.clientX-r.left-ox, dy = e.clientY-r.top-oy;
    const d = Math.hypot(dx,dy), max = 56;
    if(d>max){ dx = dx/d*max; dy = dy/d*max; }
    place(knob, ox+dx, oy+dy, 56);
    const nx = dx/max, ny = dy/max;
    const px = st.x;
    st.x = Math.abs(nx)<0.25?0:nx; st.y = Math.abs(ny)<0.25?0:ny;
    if(st.x!==0 && px===0) st.xL = st.x;
    send();
  });
  const endStick = e=>{
    if(e.pointerId!==sid) return;
    sid = null; st.x = 0; st.y = 0;
    base.style.display = 'none'; knob.style.display = 'none';
    send();
  };
  zone.addEventListener('pointerup', endStick);
  zone.addEventListener('pointercancel', endStick);
  const bindBtn = (el, key)=>{
    el.addEventListener('pointerdown', e=>{ e.preventDefault(); st[key] = true; st[key+'L'] = true; el.classList.add('on'); send(); initAudio(); });
    const off = ()=>{ st[key] = false; el.classList.remove('on'); send(); };
    el.addEventListener('pointerup', off);
    el.addEventListener('pointercancel', off);
    el.addEventListener('pointerleave', off);
  };
  bindBtn(document.getElementById('btnA'), 'a');
  bindBtn(document.getElementById('btnJ'), 'j');
  bindBtn(document.getElementById('btnB'), 's');
  document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault());
}
// lokal touchkontroll: spela direkt på mobilen/surfplattan som värd
let LOCALPAD = false;
const TCTRL = {x:0, y:0, a:false, j:false, s:false};
function enableLocalPad(){
  if(LOCALPAD || CTRL_STARTED) return;
  LOCALPAD = true;
  const padUI = document.getElementById('padUI');
  padUI.classList.add('local');
  padUI.style.display = 'flex';
  bindPadControls(TCTRL, ()=>{});
}
let CTRL_STARTED = false;
function startCtrl(code){
  // OBS: guarda med egen flagga — inte MODE==='ctrl', för vid ?room=-boot är
  // MODE redan 'ctrl' och kontrollen skulle aldrig starta (bugg i förra spelet)
  if(CTRL_STARTED) return;
  CTRL_STARTED = true;
  MODE = 'ctrl';
  document.getElementById('wrap').style.display = 'none';
  document.getElementById('chooseUI').style.display = 'none';
  const padUI = document.getElementById('padUI');
  padUI.style.display = 'flex';
  const top = document.getElementById('padTop');
  const st = {x:0, y:0, a:false, j:false, s:false};
  let conn = null, connected = false;
  const send = ()=>{
    if(connected){ try{ conn.send({t:'i', x:Math.round(st.x*100)/100, y:Math.round(st.y*100)/100, a:st.a, j:st.j, s:st.s}); }catch(e){} }
  };
  setInterval(send, 100);
  top.textContent = 'Ansluter till rum '+code.toUpperCase()+'…';
  const peer = new Peer(ICE_OPTS);
  let attempts = 0;
  peer.on('disconnected', ()=>{ try{ peer.reconnect(); }catch(e){} });
  const tryConnect = ()=>{
    attempts++;
    conn = peer.connect('slemhamnd-'+code.toLowerCase(), { reliable: true });
    conn.on('open', ()=>{ connected = true; attempts = 0; top.innerHTML = '<b style="color:#8fe89a">Ansluten!</b> Tryck SLÅ för att gå med i spelet.'; });
    conn.on('data', d=>{
      if(!d || d.t!=='you') return;
      if(d.st==='lobby') top.innerHTML = 'Ansluten till <b>'+code.toUpperCase()+'</b> — tryck SLÅ för att gå med!';
      else if(d.st==='select') top.innerHTML = '<span style="color:'+d.color+'">&#9632; Spelare '+d.n+'</span> — '+d.cls
        + (d.inPlay ? ' — styr &#8592;&#8594; och tryck SLÅ för att hoppa in!'
           : (d.ready ? ' — <b style="color:#8fe89a">REDO!</b> (HOPP = ångra)' : ' — styr &#8592;&#8594; för att välja hjälte, SLÅ = redo'));
      else if(d.st==='over') top.innerHTML = '<b style="color:#ff6a5e">Alla är nere!</b> Tryck SLÅ för att fortsätta!';
      else if(d.st==='victory') top.innerHTML = '<b style="color:#8fe89a">SEGER!</b> Ni besegrade Slemkungen! &#127881;';
      else if(d.st==='clear') top.innerHTML = '<b style="color:#ffd23c">BANA KLAR!</b> '+d.cls+': '+d.score+' poäng';
      else {
        const blocks = 10, filled = Math.max(0, Math.round(d.hp/d.maxhp*blocks));
        const hpbar = '<span style="color:#8fe89a">'+'&#9608;'.repeat(filled)+'</span><span style="color:#3a3452">'+'&#9608;'.repeat(blocks-filled)+'</span>';
        top.innerHTML = '<span style="color:'+d.color+'">&#9632; '+d.cls+'</span> '+hpbar+' '
          + (d.downed ? '<b style="color:#ff6a5e">NERE! En vän kan hjälpa dig upp!</b>'
             : (d.sp>=100 ? '<b style="color:#5ae0e0">SPECIAL REDO!</b>' : 'special '+d.sp+'%'));
      }
    });
    conn.on('close', ()=>{
      if(connected){ connected = false; top.innerHTML = '<b style="color:#ff6a5e">Tappade anslutningen.</b> Försöker igen…'; setTimeout(tryConnect, 2000); }
    });
    conn.on('error', ()=>{});
  };
  const retry = ()=>{
    if(connected) return;
    if(attempts < 6){
      top.innerHTML = 'Hittar inte rummet <b>'+code.toUpperCase()+'</b> — försöker igen ('+attempts+'/5)…';
      setTimeout(tryConnect, 2500);
    } else {
      top.innerHTML = '<b style="color:#ff6a5e">Kunde inte ansluta.</b> Kolla att koden stämmer och att spelet är igång på stora skärmen, ladda sedan om sidan.';
    }
  };
  peer.on('open', tryConnect);
  peer.on('error', err=>{
    if(err && err.type==='peer-unavailable') retry();
    else if(!connected && attempts>0 && err && err.type!=='disconnected') retry();
  });
  bindPadControls(st, send);
}

cv.addEventListener('pointerdown', e=>{

window.__START = (cis)=>{ players = (cis||[0]).map((ci,i)=>mkPlayer(ci,'dbg'+i,i)); joiners=[]; startLevel(0); };
window.__GOTO = i=>{ startLevel(i); };
window.__CAM = x=>{ camX = x; players.forEach(p=>{ p.x = Math.max(p.x, camX+40); }); };
window.__KILLWAVE = ()=>{ for(const e of [...enemies]) if(!e.boss) killEnemy(e,null); spawnQ=[]; };
window.__KILLBOSS = ()=>{ if(bossObj){ bossObj.introT=0; damageEnemy(bossObj, 99999, players[0]||null, false); } };
window.__BOSSNOW = ()=>{ const L=LEVELS[LI]; waveIdx=L.waves.length; spawnQ=[]; for(const e of [...enemies]) if(!e.boss) killEnemy(e,null); waveActive=false; camX = L.len-VW; players.forEach(p=>p.x=Math.max(p.x,camX+60)); };
window.__SONG = k=>setSong(k);
if(MODE==='ctrl'){
  startCtrl(URLQ.get('room'));
} else if(MODE==='choose'){
  const chooseUI = document.getElementById('chooseUI');
  chooseUI.style.display = 'flex';
  // pointerup + click med dubbelskydd — iOS kan svälja rena click-händelser
  const onTap = (el, fn)=>{
    let last = 0;
    const h = e=>{ const now = performance.now(); if(now-last<400) return; last = now; fn(e); };
    el.addEventListener('pointerup', h);
    el.addEventListener('click', h);
  };
  onTap(document.getElementById('chJoin'), ()=>{
    document.getElementById('chJoin').style.display = 'none';
    document.getElementById('codeRow').style.display = 'flex';
    document.getElementById('codeInput').focus();
  });
  const go = ()=>{
    const code = document.getElementById('codeInput').value.trim();
    if(code.length===4) startCtrl(code);
  };
  onTap(document.getElementById('chGo'), go);
  document.getElementById('codeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
  let hostStarted = false;
  onTap(document.getElementById('chHost'), ()=>{
    if(hostStarted) return; hostStarted = true;
    chooseUI.style.display = 'none';
    startHost();
    if(IS_TOUCH) enableLocalPad();
    lastT = performance.now();
    requestAnimationFrame(frame);
  });
} else {
  startHost();
  if(IS_TOUCH && Math.min(window.innerWidth, window.innerHeight) < 900) enableLocalPad();
  requestAnimationFrame(frame);
}
</script>
</body></html>
